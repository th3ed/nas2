---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: presidio-anonymizer
  namespace: presidio
  labels:
    app.kubernetes.io/name: presidio-anonymizer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: presidio-anonymizer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: presidio-anonymizer
    spec:
      containers:
        - name: presidio-anonymizer
          image: mcr.microsoft.com/presidio-anonymizer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
