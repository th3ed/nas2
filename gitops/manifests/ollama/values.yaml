---
runtimeClassName: nvidia

image:
  repository: ollama/ollama
  tag: "0.30.8"
  pullPolicy: IfNotPresent

ollama:
  gpu:
    enabled: true
    type: nvidia
    number: 1
  models:
    pull:
      # Single GPU-resident chat model. Qwen3.5 9B Unsloth Dynamic 2.0
      # (Q4_K_XL ≈ Q5/Q6 quality, ~6 GB) with native tool-calling. Embeddings
      # moved to the CPU-only ollama-embed release, so the full ~10 GB RTX is
      # available for weights + KV cache. Gated DeltaNet (linear attn in 75% of
      # layers) keeps the KV cache small even at 128K context.
      - isotnek/qwen3.5:9B-Unsloth-UD-Q4_K_XL
    run: []

persistentVolume:
  enabled: true
  size: 200Gi
  accessModes:
    - ReadWriteOnce

resources:
  limits:
    nvidia.com/gpu: 1

service:
  type: ClusterIP
  port: 11434

extraEnv:
  # OLLAMA_CONTEXT_LENGTH (not OLLAMA_NUM_CTX) is the recognized server-side env
  # var in ollama >=0.6. Without this set correctly, ollama loads every model with
  # the 4096-token default and silently truncates longer prompts.
  #
  # Qwen3.5 9B supports a 256K window; we cap at 131072 which is plenty for the
  # agent prompt floor (~18K) plus long conversations. Gated DeltaNet keeps the
  # KV cache small, so this fits comfortably alongside the ~6 GB of weights on
  # the 10 GB GPU now that embeddings live on the CPU instance.
  - name: OLLAMA_CONTEXT_LENGTH
    value: "131072"
  # Keep the chat model resident across idle gaps so a fresh chat turn doesn't
  # pay a multi-second cold-load. Default keep_alive is 5m.
  - name: OLLAMA_KEEP_ALIVE
    value: "24h"
  # Flash attention is required for KV cache quantization. Setting it
  # explicitly also forces it on for any model that doesn't auto-enable.
  - name: OLLAMA_FLASH_ATTENTION
    value: "true"
  # q8_0 quantizes the KV cache from fp16 to int8, halving its memory
  # footprint with negligible quality loss. At 128K context the KV cache
  # would otherwise grow ~4x vs 32K (224 MiB → ~896 MiB on GPU); q8_0
  # keeps it around the 32K-fp16 size and frees VRAM for compute graph.
  - name: OLLAMA_KV_CACHE_TYPE
    value: "q8_0"

replicaCount: 1
updateStrategy:
  type: Recreate
