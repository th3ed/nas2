---
runtimeClassName: nvidia

image:
  repository: ollama/ollama
  tag: "0.21.2"
  pullPolicy: IfNotPresent

ollama:
  gpu:
    enabled: true
    type: nvidia
    number: 1
  models:
    pull:
      - qwen3-coder-next:latest
      - gemma4:e4b
    run: []

persistentVolume:
  enabled: true
  size: 200Gi
  accessModes:
    - ReadWriteOnce

resources:
  limits:
    nvidia.com/gpu: 1

service:
  type: ClusterIP
  port: 11434

extraEnv: []

# Single-node now; spread across nodes in the future when multi-node arrives.
replicaCount: 1
updateStrategy:
  type: Recreate
