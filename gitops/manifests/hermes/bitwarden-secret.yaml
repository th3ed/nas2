---
# sm-operator materializes this into a real Secret named `hermes-secrets`
# that the Deployment consumes via envFrom. The bw-auth-token Secret is
# created out-of-band by the argocd_bootstrap Ansible role from
# vault_bitwarden_sm_token.
#
# LITELLM_API_KEY reuses the same Bitwarden secret already mapped for
# openclaw. TELEGRAM_BOT_TOKEN points at a dedicated Hermes bot
# (hermes-telegram-bot-token) so the two agents can run side-by-side
# without colliding on the same long-poll connection. API_SERVER_KEY,
# TELEGRAM_ALLOWED_USERS, and TELEGRAM_HOME_CHANNEL are hermes-specific.
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: hermes-secrets
  namespace: hermes
spec:
  organizationId: c046a20a-413d-4b54-8a56-b1790122c5ef
  secretName: hermes-secrets
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: bc6ab03e-ec7c-413d-8dd8-b44d001665cc
      secretKeyName: API_SERVER_KEY
    - bwSecretId: 1f9a8e52-b5f9-4efe-9c1c-b46b001560f4
      secretKeyName: TELEGRAM_BOT_TOKEN
    - bwSecretId: b1146e21-9f96-4370-ae0a-b44d0016fd21
      secretKeyName: TELEGRAM_ALLOWED_USERS
    - bwSecretId: 8dcef4e5-4c63-4a69-8a1f-b44d001cbf3b
      secretKeyName: TELEGRAM_HOME_CHANNEL
    - bwSecretId: 53904946-84fc-46dd-858b-b446001ff47a
      secretKeyName: LITELLM_API_KEY
