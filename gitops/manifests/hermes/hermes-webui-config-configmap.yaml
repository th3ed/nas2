---
# hermes-webui doesn't get a HERMES_HOME shared volume from the upstream
# multi-container compose pattern (hermes runs on nas2 with a local-path
# PVC; hermes-webui runs on desktop — no cross-node RWX). Without
# ~/.hermes/config.yaml the webui's model picker is empty, /api/models
# returns {active_provider:null, default_model:"", groups:[]}, and the
# chat surface can't dispatch.
#
# Gateway-mode chat itself (HERMES_WEBUI_CHAT_BACKEND=gateway) does NOT
# use this file — gateway_chat.py reads HERMES_WEBUI_GATEWAY_BASE_URL /
# _API_KEY from env and forwards whatever model name the UI submits to
# hermes-agent's /v1/chat/completions. This config exists only to populate
# the picker so the user has a model name to select. We advertise the
# `hermes-agent` model that the gateway returns from /v1/models.
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-webui-config
  namespace: hermes
data:
  config.yaml: |
    model:
      provider: custom
      model: hermes-agent
      base_url: http://hermes.hermes:80/v1
      api_key: ${HERMES_WEBUI_GATEWAY_API_KEY}

    custom_providers:
      - name: Hermes Gateway
        base_url: http://hermes.hermes:80/v1
        api_key: ${HERMES_WEBUI_GATEWAY_API_KEY}
        model: hermes-agent
        models:
          - hermes-agent
