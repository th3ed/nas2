---
# Declarative Hermes runtime config. Mounted into the container at
# /opt/data/config.yaml via subPath so it sits alongside the PVC-backed
# state directory (memories/, skills/, sessions/, logs/, .env, etc.).
# Hermes interpolates ${VAR} from the process environment; LITELLM_API_KEY
# comes from the envFrom-injected hermes-secrets Secret.
#
# Schema: https://hermes-agent.nousresearch.com/docs/user-guide/configuration
#
# provider: custom is the registered name for arbitrary OpenAI-compatible
# endpoints (the docs list "openai" but the live binary registers it as
# "custom"; aliases include ollama/local/vllm/llamacpp). See
# /opt/hermes/plugins/model-providers/custom/__init__.py in the image.
# All model slots are routed through the in-cluster LiteLLM proxy at
# litellm.litellm:4000, which provides per-model PII guardrails and a
# single observability surface (prometheus + otel callbacks).
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-app-config
  namespace: hermes
data:
  config.yaml: |
    # Main model — used for the primary agent loop and Telegram conversations.
    # Local-first: the free Qwen3.5 9B handles routine turns; users can switch
    # per-session via the CLI/API. Frontier Claude models are listed in the
    # picker below but are never an automatic slot (explicit-approval only).
    #
    # IMPORTANT: the chosen-model key in this dict is `default`, not `model`.
    # web_server._normalize_config_for_web, gateway/run.py current_model, and
    # hermes_cli/runtime_provider.py all strict-read `model.default` and fall
    # back to `""` — i.e., with `model.model` the dashboard Chat picker shows
    # "no model". Lenient readers (dump.py, doctor.py) accept either, which
    # is why the Telegram path still answered prompts under the wrong key.
    model:
      provider: custom
      default: "qwen3.5:9b"
      base_url: http://litellm.litellm:4000/v1
      api_key: ${LITELLM_API_KEY}
      context_length: 131072

    # Auto-fallback when the local model errors / rate-limits. DeepSeek V4 Pro
    # is a cheap-but-capable cloud model ($0.435/$0.87 per 1M) for complex
    # turns the local model can't complete — deliberately NOT Claude, which
    # stays explicit-approval-only.
    fallback_model:
      provider: custom
      model: deepseek-v4-pro
      base_url: http://litellm.litellm:4000/v1
      api_key: ${LITELLM_API_KEY}

    # Vision-capable model for image inputs. Local Qwen3.5 in our catalog is
    # text-only, so route to free Gemini 2.5 Flash (vision-capable, $0) rather
    # than paid Claude — keeps vision off the explicit-Claude budget.
    auxiliary:
      vision:
        provider: custom
        model: gemini-2.5-flash
        base_url: http://litellm.litellm:4000/v1
        api_key: ${LITELLM_API_KEY}
      # Context compression runs frequently on long sessions — route to the
      # free local Qwen3.5 model to avoid spend on summarization.
      compression:
        provider: custom
        model: qwen3.5:9b
        base_url: http://litellm.litellm:4000/v1
        api_key: ${LITELLM_API_KEY}

    # Run shell commands inside the hermes pod itself. Blast radius is bounded
    # by the namespace + PVC; nothing on the host or other namespaces is reachable.
    terminal:
      backend: local

    # Expose all LiteLLM-proxied models in the Hermes model picker. The custom
    # provider profile has base_url="" in its compiled-in defaults, so fetch_models()
    # returns None and automatic discovery never fires. custom_providers is the
    # config-driven mechanism that populates the picker.
    custom_providers:
      - name: "LiteLLM"
        base_url: http://litellm.litellm:4000/v1
        api_key: ${LITELLM_API_KEY}
        model: "qwen3.5:9b"
        models:
          # Local (free).
          - "qwen3.5:9b"
          # Cheap cloud — selectable for complex turns; deepseek-v4-pro is also
          # the automatic error-fallback.
          - "deepseek-v4-pro"
          - "deepseek-v4-flash"
          - "kimi-k2.6"
          - "glm-5.1"
          # Free Gemini tier.
          - "gemini-2.5-flash"
          - "gemini-2.5-pro"
          - "gemini-2.0-flash"
          # Frontier Claude — selectable per-session = explicit approval. Never
          # an automatic slot (main/fallback/vision/compression all avoid them).
          - "claude-opus-4.7"
          - "claude-sonnet-4.6"
          - "claude-haiku-4.5"

    # Prune the upstream-bundled skill set. Hermes ships ~82 skills in its
    # image (skills/<category>/<name>/SKILL.md) and auto-indexes every one
    # into the system prompt at every turn — ~18k tokens before we add a
    # single message. Per agent/skill_utils.py:175 (get_disabled_skill_names),
    # any name listed under skills.disabled is filtered out at three sites
    # in prompt_builder.py (lines 1048, 1073, 1128) when building the
    # skills section.
    #
    # Keep: 28 skills covering email (himalaya), GitHub workflow, MCP
    # authoring, PDF/OCR, research (arxiv/llm-wiki/research-paper-writing),
    # red-teaming (godmode), opencode, webhook-subscriptions, and the full
    # software-development category (TDD, debugging, planning).
    # Disable: 54 skills covering Apple, gaming, smart-home, creative/visual
    # generation, media streaming, productivity SaaS (notion/linear/airtable/
    # google-workspace/etc.), and a few one-offs (xurl, obsidian, yuanbao,
    # dogfood) — irrelevant to this homelab.
    #
    # Web search/extract remains available via the `web` toolset (SEARXNG_URL
    # in deployment.yaml) — it is a toolset, not a skill, and not gated by
    # this list. The freshrss skill comes from agentregistry and is also
    # outside this filter.
    skills:
      disabled:
        # apple (5)
        - apple-notes
        - apple-reminders
        - findmy
        - imessage
        - macos-computer-use
        # autonomous-ai-agents (4 — keeping opencode)
        - claude-code
        - codex
        - hermes-agent
        - kanban-codex-lane
        # creative (20 — all)
        - architecture-diagram
        - ascii-art
        - ascii-video
        - baoyu-article-illustrator
        - baoyu-comic
        - baoyu-infographic
        - claude-design
        - comfyui
        - creative-ideation
        - design-md
        - excalidraw
        - humanizer
        - manim-video
        - p5js
        - pixel-art
        - popular-web-designs
        - pretext
        - sketch
        - songwriting-and-ai-music
        - touchdesigner-mcp
        # data-science (1 — all)
        - jupyter-live-kernel
        # devops (2 — keeping webhook-subscriptions)
        - kanban-orchestrator
        - kanban-worker
        # gaming (2 — all)
        - minecraft-modpack-server
        - pokemon-player
        # media (5 — all)
        - gif-search
        - heartmula
        - songsee
        - spotify
        - youtube-content
        # mlops (1 — all)
        - huggingface-hub
        # note-taking (1 — all)
        - obsidian
        # productivity (7 — keeping nano-pdf, ocr-and-documents)
        - airtable
        - google-workspace
        - linear
        - maps
        - notion
        - powerpoint
        - teams-meeting-pipeline
        # research (2 — keeping arxiv, llm-wiki, research-paper-writing)
        - blogwatcher
        - polymarket
        # smart-home (1 — all)
        - openhue
        # social-media (1 — all)
        - xurl
        # uncategorized (2 — all)
        - dogfood
        - yuanbao
        # inference-sh / mlops extras (4 — keeping dspy, lm-evaluation-harness,
        # obliteratus, vllm; these 8 skills are in the deployed image but
        # not in the public main-branch git tree).
        - audiocraft
        - llama-cpp
        - segment-anything
        - weights-and-biases

    # Voice mode — STT for inbound Telegram voice memos and CLI ctrl+b
    # recording; TTS for spoken replies once a user issues /voice on.
    # auto_tts is false so text stays the default reply mode; /voice on
    # toggles spoken replies for that session, /voice off reverts.
    # Inbound voice-memo transcription is always-on whenever stt is
    # configured — independent of /voice state.
    #
    # STT is local: faster-whisper "base" (~150 MB) on CPU — the RTX
    # stays reserved for Qwen3.5 9B. HF_HOME (set in deployment.yaml)
    # pins the model cache to the hermes-data PVC so the first-run
    # download survives pod restarts.
    #
    # TTS is `edge` (Hermes default): Microsoft's free Edge-Read-Aloud
    # cloud endpoint. No API key, no model download, sub-second latency.
    # Reply *text* egresses to Microsoft; no audio data ever leaves the
    # cluster's egress in this direction (the synth happens on MS's
    # side and audio bytes come back). NeuTTS was the first pick for
    # fully-local TTS but the upstream `nousresearch/hermes-agent` image
    # ships without `espeak-ng` — NeuTTS is a phoneme-input model and
    # would fail at first inference via the phonemizer backend. A
    # fully-local TTS path is possible via a custom image overlay that
    # apt-installs espeak-ng (+ verifies neuphonic/phonemizer in the
    # venv); not done here to keep this change config-only.
    voice:
      record_key: "ctrl+b"
      max_recording_seconds: 120
      auto_tts: false
      beep_enabled: true
      silence_threshold: 200
      silence_duration: 3.0

    stt:
      provider: "local"
      local:
        model: "base"

    tts:
      provider: "edge"
      edge:
        voice: "en-US-AriaNeural"

    # Long-term memory is provided by the native Honcho plugin
    # (memory.provider: honcho). Honcho is the community-favorite memory
    # backend for self-hosted Hermes — first on the official provider list
    # at hermes-agent.nousresearch.com, the architectural pair to Hermes's
    # "agent that grows with you" thesis, and AGPL-3.0 / self-hostable via
    # the upstream-published image at ghcr.io/plastic-labs/honcho.
    #
    # Honcho's per-host config (peerName, workspace, aiPeer, recallMode,
    # …) lives in the sibling `honcho.json` ConfigMap key. Hermes reads
    # that file at $HERMES_HOME/honcho.json (i.e. /opt/data/honcho.json) —
    # mounted via subPath in deployment.yaml. Edit the ConfigMap, then
    # `rollout restart deploy/hermes` to pick up changes (subPath mounts
    # freeze at pod-start, same gotcha as openclaw.json).
    #
    # Because the native provider plugs into the built-in `memory` toolset
    # (NOT MCP), the agent sees the canonical short tool names the model
    # was trained on (memory_add, memory_search, …) AND
    # /opt/hermes/run_agent.py:6095 auto-injects MEMORY_GUIDANCE into the
    # system prompt. No `agent.system_prompt` nudge or `disabled_toolsets`
    # workaround needed.
    memory:
      provider: honcho
      memory_enabled: true
      user_profile_enabled: true

    # Remote MCP servers Hermes connects to at startup. The schema and
    # tools.{resources,prompts} semantics are documented at
    # https://hermes-agent.nousresearch.com/docs/reference/mcp-config-reference
    # — Hermes performs the MCP handshake and registers each tool the
    # remote exposes alongside its built-in tools and skills.
    mcp_servers:
      news:
        url: http://news-mcp.news:8080/mcp/
        timeout: 60
        connect_timeout: 30
        tools:
          resources: false
          prompts: false

    # Telegram is configured entirely via env vars (TELEGRAM_BOT_TOKEN,
    # TELEGRAM_ALLOWED_USERS, optionally TELEGRAM_HOME_CHANNEL) which Hermes
    # reads from the envFrom-injected hermes-secrets Secret. Long-polling
    # mode — no webhook needed; the Tailscale Ingress only fronts the
    # OpenAI-compatible API server on port 8642.
  # Honcho per-host config, subPath-mounted at /opt/data/honcho.json by
  # deployment.yaml. Schema documented at
  # https://honcho.dev/docs/v3/guides/integrations/hermes.
  #
  # baseUrl points at our in-cluster Honcho api Service; no API key field
  # because the api server runs with AUTH_USE_AUTH=false (network is the
  # auth boundary in this homelab — see gitops/manifests/honcho/api-deployment.yaml).
  #
  # The hosts.hermes block names the peers Honcho uses for dialectic
  # modeling: peerName=ed is the human, aiPeer=hermes is the agent.
  # workspace=hermes scopes memories to this agent (so future Claude Code /
  # OpenCode integrations can use distinct workspaces and not collide).
  honcho.json: |
    {
      "baseUrl": "http://api.honcho:8000",
      "hosts": {
        "hermes": {
          "enabled": true,
          "aiPeer": "hermes",
          "peerName": "ed",
          "workspace": "hermes"
        }
      }
    }
