---
apiVersion: v1
kind: Service
metadata:
  name: hermes
  namespace: hermes
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: hermes
  ports:
    - name: http
      port: 80
      targetPort: 8642
      protocol: TCP
    - name: dashboard
      port: 8080
      targetPort: 9119
      protocol: TCP
