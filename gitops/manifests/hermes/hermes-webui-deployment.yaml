apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-webui
  namespace: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes-webui
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes-webui
    spec:
      containers:
        - name: hermes-webui
          image: ghcr.io/nesquena/hermes-webui:latest
          ports:
            - name: http
              containerPort: 8787
          env:
            - name: HERMES_WEBUI_CHAT_BACKEND
              value: gateway
            - name: HERMES_WEBUI_GATEWAY_BASE_URL
              value: http://hermes.hermes:80
            - name: HERMES_WEBUI_GATEWAY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: API_SERVER_KEY
            - name: HERMES_WEBUI_HOST
              value: "0.0.0.0"
            - name: HERMES_WEBUI_PORT
              value: "8787"
            - name: HERMES_WEBUI_STATE_DIR
              value: /state
            - name: HERMES_WEBUI_SKIP_ONBOARDING
              value: "1"
          volumeMounts:
            - name: state
              mountPath: /state
          livenessProbe:
            httpGet:
              path: /health
              port: 8787
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8787
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: state
          emptyDir: {}
