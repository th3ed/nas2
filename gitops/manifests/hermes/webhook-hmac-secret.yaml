---
# sm-operator materializes this into a Secret named `webhook-hmac` in the
# hermes namespace. The Hermes Deployment consumes it via envFrom so:
#   1. The webhook adapter validates incoming POSTs against
#      WEBHOOK_HMAC_SECRET (config.yaml platforms.webhook.extra.secret
#      interpolates ${WEBHOOK_HMAC_SECRET}).
#   2. The post-issue.py helper signs outbound POSTs to issue-creator
#      with the same secret (which issue-creator validates).
#
# Same bwSecretId as issue-creator/bitwarden-secret.yaml — both ends of
# the Hermes ↔ issue-creator channel share one HMAC for v1. Per-route
# secrets are an easy follow-up if leakage ever becomes a concern.
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: webhook-hmac
  namespace: hermes
spec:
  organizationId: c046a20a-413d-4b54-8a56-b1790122c5ef
  secretName: webhook-hmac
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: 28a9655e-1d93-45e5-97e9-b44e00035064
      secretKeyName: WEBHOOK_HMAC_SECRET
