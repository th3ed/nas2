---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
spec:
  replicas: 1
  strategy:
    # Recreate so subPath-mounted config.yaml refreshes cleanly on
    # ConfigMap edits (same gotcha as openclaw — subPath mounts freeze at
    # pod start). Combined with ReadWriteOnce PVC this avoids two pods
    # racing for /opt/data.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
    spec:
      # PVC is owned by root by default; Hermes drops to non-root UID 10000
      # via gosu in its entrypoint. fsGroup makes the mount writable by
      # that GID so memories/, skills/, sessions/, logs/, and .env can be
      # written by the hermes user.
      securityContext:
        fsGroup: 10000
      initContainers:
        - name: install-registry-skills
          # Pulls every skill registered in the in-cluster AgentRegistry
          # (gitops/apps/agentregistry.yaml) into /data/skills/<name>/.
          # Refreshed on every pod start; restart with
          # `kubectl -n hermes rollout restart deploy/hermes` after
          # registering a new skill.
          #
          # Skill source model: AgentRegistry's Skill.spec.source.repository
          # is a git location (url + branch + subfolder), so we clone with
          # git rather than pulling OCI images. Skills published via
          # `arctl build --push` (which produces an OCI image) are NOT
          # supported by this loop — register skills with a public git
          # repository instead. The chart's REST API at /v0/skills returns
          # the full Skill record including spec.source.repository.
          #
          # Defensive: any per-skill failure logs WARN and continues;
          # registry unreachable after a short retry exits 0 so this
          # container never blocks pod startup.
          image: alpine/git:2.45.2
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -u
              # alpine/git is alpine-based; add curl + jq for the API call.
              apk add --no-cache --quiet curl jq >/dev/null 2>&1 || {
                echo "WARN: apk add failed; skipping skill install"; exit 0; }

              REGISTRY=http://agentregistry.agentregistry:12121
              mkdir -p /data/skills

              # Wait up to ~30s for the registry to be reachable. Fresh
              # cluster bring-up can have Argo finish hermes before
              # agentregistry's Postgres is Ready.
              for i in 1 2 3 4 5 6; do
                if curl -fsS "${REGISTRY}/v0/health" >/dev/null 2>&1; then
                  break
                fi
                sleep 5
              done
              if ! curl -fsS "${REGISTRY}/v0/health" >/dev/null 2>&1; then
                echo "WARN: AgentRegistry unreachable after 30s; skipping"
                exit 0
              fi

              body=$(curl -fsS "${REGISTRY}/v0/skills?namespace=all" || echo '{"items":[]}')
              count=$(echo "$body" | jq '.items | length')
              if [ "$count" = "0" ]; then
                echo "INFO: AgentRegistry catalog is empty; nothing to install"
                exit 0
              fi
              echo "INFO: found $count skill(s) in registry"

              echo "$body" | jq -c '.items[]' | while read -r skill; do
                name=$(echo "$skill" | jq -r '.metadata.name')
                url=$(echo "$skill" | jq -r '.spec.source.repository.url // empty')
                branch=$(echo "$skill" | jq -r '.spec.source.repository.branch // "main"')
                subfolder=$(echo "$skill" | jq -r '.spec.source.repository.subfolder // ""')

                if [ -z "$url" ]; then
                  echo "WARN: skill $name has no spec.source.repository.url; skipping"
                  continue
                fi

                dest=/data/skills/$name
                tmp=$(mktemp -d)
                echo "INFO: cloning $url ($branch) for skill $name"
                if ! git clone --depth 1 --branch "$branch" "$url" "$tmp" 2>&1; then
                  echo "WARN: clone failed for $name; skipping"
                  rm -rf "$tmp"
                  continue
                fi

                rm -rf "$dest"
                if [ -n "$subfolder" ]; then
                  mv "$tmp/$subfolder" "$dest" || {
                    echo "WARN: subfolder $subfolder not found in $name; skipping"
                    rm -rf "$tmp"
                    continue
                  }
                else
                  mv "$tmp" "$dest"
                  tmp=""
                fi
                [ -n "$tmp" ] && rm -rf "$tmp"
                echo "INFO: installed $name -> $dest"
              done
              echo "INFO: skill install complete"
          volumeMounts:
            - name: data
              mountPath: /data
        - name: install-freshrss-skill
          # Clones the FreshRSS skill into the Hermes skills directory.
          # The skill is available at /data/skills/freshrss/ (= /opt/data/skills/
          # from the main container's perspective). If the remote repo is
          # unreachable (e.g., not yet pushed), the container exits 0 so it
          # doesn't block pod startup.
          image: alpine/git:2.45.2
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /data/skills
              if [ -d /data/skills/freshrss/.git ]; then
                git -C /data/skills/freshrss pull --ff-only 2>/dev/null || true
              else
                rm -rf /data/skills/freshrss
                if git clone --depth 1 https://github.com/th3ed/freshrss_hermes_skill.git /tmp/skill 2>/dev/null; then
                  mv /tmp/skill/freshrss /data/skills/freshrss
                  rm -rf /tmp/skill
                else
                  echo "WARN: freshrss skill repo not available yet, skipping"
                fi
              fi
          volumeMounts:
            - name: data
              mountPath: /data
        - name: patch-prompt-builder
          # Same digest as the main container — ensures we copy and patch the
          # correct version of prompt_builder.py. Update both image fields
          # atomically when upgrading hermes-agent.
          image: nousresearch/hermes-agent@sha256:b6e41c155d6bfce5ad83c5d0fec670086db8a43250e4511c9474134be5482d33
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp /opt/hermes/agent/prompt_builder.py /patch/prompt_builder.py
              # TOOL_USE_ENFORCEMENT_MODELS (prompt_builder.py ~line 271) does a
              # substring match: any model whose name contains "gemma" gets ~3500
              # tokens of OpenAI XML tool-enforcement guidance injected. This
              # guidance is designed for GPT/Gemini-style models and structurally
              # conflicts with Gemma-4's native tool-calling format, causing
              # finish_reason=stop on every agent turn instead of tool_calls.
              # Remove "gemma" from the tuple so native tool-calling is used.
              # Remove this init container when upstream adds a config flag or
              # properly handles non-OpenAI models in the enforcement list.
              # Ref: nousresearch/hermes-agent prompt_builder.py ~line 271
              sed -i 's/, "gemma"//g' /patch/prompt_builder.py
          volumeMounts:
            - name: prompt-builder-patch
              mountPath: /patch
          securityContext:
            runAsUser: 0
      containers:
        - name: hermes
          image: nousresearch/hermes-agent@sha256:b6e41c155d6bfce5ad83c5d0fec670086db8a43250e4511c9474134be5482d33
          imagePullPolicy: IfNotPresent
          # Default entrypoint is the gosu/su-exec wrapper that drops to
          # the hermes user; args run the OpenAI-compatible gateway.
          args: ["gateway", "run"]
          ports:
            - name: http
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          envFrom:
            - secretRef:
                name: hermes-secrets
                optional: false
          env:
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            # Browser-accessible Dashboard UI on port 9119. TUI=1 adds the
            # in-browser Chat tab. Exposed via a sister Tailscale Ingress
            # (hermes-ui.taile9c9c.ts.net) — the tailnet is the auth boundary;
            # the dashboard itself has no built-in auth.
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            - name: HERMES_DASHBOARD_TUI
              value: "1"
            # Points the Hermes `web` toolset (web_search/web_extract/web_crawl)
            # at the in-cluster SearXNG instance. Presence of SEARXNG_URL
            # is the sole gate Hermes uses to enable the toolset; no API
            # key is required for the SearXNG backend.
            - name: SEARXNG_URL
              value: http://searxng.searxng:8080
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: app-config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: prompt-builder-patch
              mountPath: /opt/hermes/agent/prompt_builder.py
              subPath: prompt_builder.py
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: app-config
          configMap:
            name: hermes-app-config
        - name: prompt-builder-patch
          emptyDir: {}
