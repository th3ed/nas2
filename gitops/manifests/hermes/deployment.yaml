---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
spec:
  replicas: 1
  strategy:
    # Recreate so subPath-mounted config.yaml refreshes cleanly on
    # ConfigMap edits (same gotcha as openclaw — subPath mounts freeze at
    # pod start). Combined with ReadWriteOnce PVC this avoids two pods
    # racing for /opt/data.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
    spec:
      # PVC is owned by root by default; Hermes drops to non-root UID 10000
      # via gosu in its entrypoint. fsGroup makes the mount writable by
      # that GID so memories/, skills/, sessions/, logs/, and .env can be
      # written by the hermes user.
      securityContext:
        fsGroup: 10000
      initContainers:
        - name: patch-prompt-builder
          # Same digest as the main container — ensures we copy and patch the
          # correct version of prompt_builder.py. Update both image fields
          # atomically when upgrading hermes-agent.
          image: nousresearch/hermes-agent@sha256:b6e41c155d6bfce5ad83c5d0fec670086db8a43250e4511c9474134be5482d33
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp /opt/hermes/agent/prompt_builder.py /patch/prompt_builder.py
              # TOOL_USE_ENFORCEMENT_MODELS (prompt_builder.py ~line 271) does a
              # substring match: any model whose name contains "gemma" gets ~3500
              # tokens of OpenAI XML tool-enforcement guidance injected. This
              # guidance is designed for GPT/Gemini-style models and structurally
              # conflicts with Gemma-4's native tool-calling format, causing
              # finish_reason=stop on every agent turn instead of tool_calls.
              # Remove "gemma" from the tuple so native tool-calling is used.
              # Remove this init container when upstream adds a config flag or
              # properly handles non-OpenAI models in the enforcement list.
              # Ref: nousresearch/hermes-agent prompt_builder.py ~line 271
              sed -i 's/, "gemma"//g' /patch/prompt_builder.py
          volumeMounts:
            - name: prompt-builder-patch
              mountPath: /patch
          securityContext:
            runAsUser: 0
      containers:
        - name: hermes
          image: nousresearch/hermes-agent@sha256:b6e41c155d6bfce5ad83c5d0fec670086db8a43250e4511c9474134be5482d33
          imagePullPolicy: IfNotPresent
          # Default entrypoint is the gosu/su-exec wrapper that drops to
          # the hermes user; args run the OpenAI-compatible gateway.
          args: ["gateway", "run"]
          ports:
            - name: http
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
            # Webhook platform (platforms.webhook in config.yaml). In-cluster
            # only — fronted by the `hermes-webhook` Service, no Tailscale
            # Ingress. Receives signed POSTs from Alertmanager, Argo CD
            # Notifications, and (future) the test-runner cron.
            - name: webhook
              containerPort: 8644
              protocol: TCP
          envFrom:
            - secretRef:
                name: hermes-secrets
                optional: false
            # Adds WEBHOOK_HMAC_SECRET (shared with issue-creator and the
            # external signal sources) so config.yaml's platforms.webhook
            # routes and the post-issue.py helper can sign/verify.
            - secretRef:
                name: webhook-hmac
                optional: false
          env:
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            # Browser-accessible Dashboard UI on port 9119. TUI=1 adds the
            # in-browser Chat tab. Exposed via a sister Tailscale Ingress
            # (hermes-ui.taile9c9c.ts.net) — the tailnet is the auth boundary;
            # the dashboard itself has no built-in auth.
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            - name: HERMES_DASHBOARD_TUI
              value: "1"
            # Points the Hermes `web` toolset (web_search/web_extract/web_crawl)
            # at the in-cluster SearXNG instance. Presence of SEARXNG_URL
            # is the sole gate Hermes uses to enable the toolset; no API
            # key is required for the SearXNG backend.
            - name: SEARXNG_URL
              value: http://searxng.searxng:8080
            # Target the agent-loop helper post-issue.py uses to forward
            # draft issues to the in-cluster issue-creator service.
            - name: ISSUE_CREATOR_URL
              value: http://issue-creator.github-app:80/issues
            # Webhook platform env overrides — Hermes only injects the
            # global webhook secret from config when WEBHOOK_ENABLED is
            # truthy in env (see gateway/config.py ~line 1499). The
            # config.yaml platforms.webhook.extra.secret field is NOT
            # ${VAR}-interpolated, so we MUST supply the secret via env.
            - name: WEBHOOK_ENABLED
              value: "true"
            - name: WEBHOOK_PORT
              value: "8644"
            # Alias: post-issue.py + the global webhook adapter both
            # consume the same value. We keep the more descriptive
            # WEBHOOK_HMAC_SECRET from envFrom (Bitwarden-mapped) and
            # surface it as WEBHOOK_SECRET for the webhook adapter.
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: webhook-hmac
                  key: WEBHOOK_HMAC_SECRET
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: app-config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: prompt-builder-patch
              mountPath: /opt/hermes/agent/prompt_builder.py
              subPath: prompt_builder.py
              readOnly: true
            # Agent-loop skills + helper script. SubPath mounts each file
            # into the canonical Hermes layout. Pod restart picks up edits
            # (subPath mounts are frozen at pod-start time).
            - name: agent-loop-skills
              mountPath: /opt/data/skills/agent-loop/triage-alert/SKILL.md
              subPath: triage-alert.SKILL.md
              readOnly: true
            - name: agent-loop-skills
              mountPath: /opt/data/skills/agent-loop/spec-driver/SKILL.md
              subPath: spec-driver.SKILL.md
              readOnly: true
            - name: agent-loop-skills
              mountPath: /opt/data/agent-loop/bin/post-issue.py
              subPath: post-issue.py
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: app-config
          configMap:
            name: hermes-app-config
        - name: prompt-builder-patch
          emptyDir: {}
        - name: agent-loop-skills
          configMap:
            name: hermes-agent-loop-skills
