---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  labels:
    app.kubernetes.io/name: hermes
spec:
  replicas: 1
  strategy:
    # Recreate so subPath-mounted config.yaml refreshes cleanly on
    # ConfigMap edits (same gotcha as openclaw — subPath mounts freeze at
    # pod start). Combined with ReadWriteOnce PVC this avoids two pods
    # racing for /opt/data.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: hermes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hermes
    spec:
      # PVC is owned by root by default; Hermes drops to non-root UID 10000
      # via gosu in its entrypoint. fsGroup makes the mount writable by
      # that GID so memories/, skills/, sessions/, logs/, and .env can be
      # written by the hermes user.
      securityContext:
        fsGroup: 10000
      initContainers:
        - name: install-registry-skills
          # Pulls every skill registered in the in-cluster AgentRegistry
          # (gitops/apps/agentregistry.yaml) into /data/skills/<name>/.
          # Refreshed on every pod start; the Argo Sync hook
          # `skill-registry-sync` (gitops/manifests/agentregistry/skill-sync-job.yaml)
          # auto-rolls this Deployment whenever the catalog changes, so
          # adding a new skill is "edit skill-catalog.yaml + push".
          #
          # Skill source model: the deployed AgentRegistry (v0.3.3) speaks
          # the MCP Registry schema — repository is a flat {source, url}
          # with no branch or subfolder. To host multiple skills in one
          # monorepo we look up the body by convention at
          #   <repo>/gitops/skills/<name>/SKILL.md
          # falling back to <repo>/<name>/SKILL.md for single-skill
          # subdirs and <repo>/SKILL.md for one-repo-per-skill layouts.
          # Skill content not at one of those paths is logged WARN and
          # skipped.
          #
          # Defensive: any per-skill failure logs WARN and continues;
          # registry unreachable after a short retry exits 0 so this
          # container never blocks pod startup.
          image: alpine/git:2.45.2
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -u
              # alpine/git is alpine-based; add curl + jq for the API call.
              apk add --no-cache --quiet curl jq >/dev/null 2>&1 || {
                echo "WARN: apk add failed; skipping skill install"; exit 0; }

              REGISTRY=http://agentregistry.agentregistry:12121
              mkdir -p /data/skills

              # Wait up to ~30s for the registry to be reachable. Fresh
              # cluster bring-up can have Argo finish hermes before
              # agentregistry's Postgres is Ready.
              for i in 1 2 3 4 5 6; do
                if curl -fsS "${REGISTRY}/v0/health" >/dev/null 2>&1; then
                  break
                fi
                sleep 5
              done
              if ! curl -fsS "${REGISTRY}/v0/health" >/dev/null 2>&1; then
                echo "WARN: AgentRegistry unreachable after 30s; skipping"
                exit 0
              fi

              body=$(curl -fsS "${REGISTRY}/v0/skills" || echo '{"skills":[]}')
              count=$(echo "$body" | jq '.skills | length')
              if [ "$count" = "0" ]; then
                echo "INFO: AgentRegistry catalog is empty; nothing to install"
                exit 0
              fi
              echo "INFO: found $count skill(s) in registry"

              echo "$body" | jq -c '.skills[]' | while read -r entry; do
                name=$(echo "$entry" | jq -r '.skill.name')
                url=$(echo  "$entry" | jq -r '.skill.repository.url // empty')

                if [ -z "$url" ]; then
                  echo "WARN: skill $name has no repository.url; skipping"
                  continue
                fi

                dest=/data/skills/$name
                tmp=$(mktemp -d)
                echo "INFO: cloning $url for skill $name"
                if ! git clone --depth 1 "$url" "$tmp" 2>&1; then
                  echo "WARN: clone failed for $name; skipping"
                  rm -rf "$tmp"
                  continue
                fi

                rm -rf "$dest"
                if   [ -f "$tmp/gitops/skills/$name/SKILL.md" ]; then
                  mv "$tmp/gitops/skills/$name" "$dest"
                elif [ -f "$tmp/$name/SKILL.md" ]; then
                  mv "$tmp/$name" "$dest"
                elif [ -f "$tmp/SKILL.md" ]; then
                  mv "$tmp" "$dest"; tmp=""
                else
                  echo "WARN: $name has no SKILL.md (looked in gitops/skills/$name, $name, root); skipping"
                  rm -rf "$tmp"
                  continue
                fi
                [ -n "$tmp" ] && rm -rf "$tmp"
                echo "INFO: installed $name -> $dest"
              done
              echo "INFO: skill install complete"
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: hermes
          image: nousresearch/hermes-agent@sha256:b6e41c155d6bfce5ad83c5d0fec670086db8a43250e4511c9474134be5482d33
          imagePullPolicy: IfNotPresent
          # Default entrypoint is the gosu/su-exec wrapper that drops to
          # the hermes user; args run the OpenAI-compatible gateway.
          args: ["gateway", "run"]
          ports:
            - name: http
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          envFrom:
            - secretRef:
                name: hermes-secrets
                optional: false
          env:
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            # Browser-accessible Dashboard UI on port 9119. TUI=1 adds the
            # in-browser Chat tab. Exposed via the Tailscale Ingress at
            # hermes.taile9c9c.ts.net (tailscale-ingress.yaml) — the tailnet is
            # the auth boundary; the dashboard itself has no built-in auth.
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            - name: HERMES_DASHBOARD_TUI
              value: "1"
            # Points the Hermes `web` toolset (web_search/web_extract/web_crawl)
            # at the in-cluster SearXNG instance. Presence of SEARXNG_URL
            # is the sole gate Hermes uses to enable the toolset; no API
            # key is required for the SearXNG backend.
            - name: SEARXNG_URL
              value: http://searxng.searxng:8080
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: app-config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: app-config
          configMap:
            name: hermes-app-config
