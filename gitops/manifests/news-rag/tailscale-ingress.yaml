---
# Exposes the news-rag MCP server on the tailnet at
# https://news-rag-mcp.taile9c9c.ts.net/mcp/ so laptop clients
# (Claude Code, OpenCode) can reach it. Tailnet membership is the auth
# boundary — the MCP server itself has no token auth, same model as
# openclaw / ollama / argocd ingresses.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: news-rag-mcp
  namespace: news-rag
  annotations:
    tailscale.com/http-redirect: "true"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: news-rag-mcp
      port:
        number: 8080
  tls:
    - hosts:
        - news-rag-mcp
