---
# sm-operator materializes this into a Secret named `news-rag-secrets`,
# consumed by the postgres StatefulSet, the ingest CronJob, and the MCP
# server Deployment via envFrom / secretKeyRef.
#
# The bw-auth-token Secret is pre-created in this namespace by the
# argocd_bootstrap Ansible role (news-rag is in
# roles/argocd_bootstrap/defaults/main.yml bitwarden_namespaces).
#
# FRESHRSS_* re-use the same Bitwarden entries that the old freshrss skill
# wired into hermes-secrets — see commit history for hermes/bitwarden-secret.yaml.
# LITELLM_API_KEY is the same key as mem0/openclaw/hermes consume.
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: news-rag-secrets
  namespace: news-rag
spec:
  organizationId: c046a20a-413d-4b54-8a56-b1790122c5ef
  secretName: news-rag-secrets
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: 2ce4a3c8-3909-401f-bf84-b45a011ab7c1
      secretKeyName: POSTGRES_PASSWORD
    - bwSecretId: 53904946-84fc-46dd-858b-b446001ff47a
      secretKeyName: LITELLM_API_KEY
    - bwSecretId: 070086ba-de47-4dfc-82c9-b4520014d403
      secretKeyName: FRESHRSS_URL
    - bwSecretId: c386878f-929c-47e5-ba39-b4520014e268
      secretKeyName: FRESHRSS_USER
    - bwSecretId: bb819cab-ce11-440a-a0cf-b4520014f4b9
      secretKeyName: FRESHRSS_API_PASSWORD
