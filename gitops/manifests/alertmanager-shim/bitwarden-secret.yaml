---
# webhook-hmac in monitoring ns. The alertmanager-shim Deployment consumes
# this via envFrom — it reads WEBHOOK_HMAC_SECRET and uses it to sign
# bodies forwarded to hermes-webhook (X-Hub-Signature-256 header).
#
# Same bwSecretId as the hermes-side BitwardenSecret — both ends of the
# shim ↔ Hermes channel share one HMAC.
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: webhook-hmac
  namespace: monitoring
spec:
  organizationId: c046a20a-413d-4b54-8a56-b1790122c5ef
  secretName: webhook-hmac
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: 28a9655e-1d93-45e5-97e9-b44e00035064
      secretKeyName: WEBHOOK_HMAC_SECRET
