---
# Auto-generated by scripts/regen-pr-reviewer-configmap.py from
# gitops/manifests/pr-reviewer/src/. Do not hand-edit; edit the source
# files and re-run the script.
apiVersion: v1
kind: ConfigMap
metadata:
  name: pr-reviewer-payload
  namespace: agents
data:
  run.sh: |
    #!/usr/bin/env bash
    # pr-reviewer wrapper. Spawned per-PR-event by agent-controller (eventually);
    # also runnable manually via scripts/pr-reviewer/job-template.yaml.
    #
    # Inputs (env):
    #   - PR_NUMBER: GH PR being reviewed (string, optional for manual runs)
    #   - PR_DATA_PATH: directory inside container with pre-staged review
    #     inputs (default /opt/pr-data/). Expected files:
    #       - diff.patch     PR's unified diff (git diff base..head)
    #       - pr.md          PR title + body
    #       - issue.md       linked issue body (the original spec)
    #   - MODEL: opencode --model arg (default litellm/gemma4:e4b — per the
    #     two-key principle: reviewer uses a DIFFERENT model from dev-agent,
    #     which defaults to qwen3-coder-next).
    #   - REPO_URL: git URL to clone for context-reading (default
    #     https://github.com/th3ed/nas2). The reviewer reads AGENTS.md +
    #     surrounding code; it never writes the repo.
    #   - OPENAI_BASE_URL / OPENAI_API_KEY: LiteLLM endpoint (envFrom).
    #
    # Outputs:
    #   - /workspace/.review.json — structured verdict consumed by
    #     pr-reviewer-poster:
    #       {
    #         "verdict": "APPROVED" | "CHANGES_REQUESTED",
    #         "summary": "<one-paragraph why>",
    #         "blocking_issues": ["<bullet>", ...],
    #         "comments": [{"path": "...", "line": N, "body": "..."}],
    #       }
    #   - /workspace/.review.summary — last 40 lines of opencode log
    #
    # This wrapper does NOT post the review to GitHub. The pr-reviewer-poster
    # Job is a separate identity holding the only pulls:write token.
    
    set -euo pipefail
    
    PR_DATA_PATH="${PR_DATA_PATH:-/opt/pr-data}"
    MODEL="${MODEL:-litellm/gemma4:e4b}"
    REPO_URL="${REPO_URL:-https://github.com/th3ed/nas2}"
    WORKSPACE="${WORKSPACE:-/workspace}"
    
    export HOME="${HOME:-/root}"
    export OPENCODE_DISABLE_CLAUDE_CODE=1
    
    for f in diff.patch pr.md issue.md; do
        if [[ ! -f "$PR_DATA_PATH/$f" ]]; then
            echo "FATAL: missing $PR_DATA_PATH/$f" >&2
            exit 2
        fi
    done
    
    # --- step 1: install tools (oven/bun:1-debian ships without curl or git)
    echo "::group:: install tools"
    apt-get update -qq
    apt-get install -yqq git ca-certificates jq >/dev/null
    bun install -g opencode-ai >/dev/null
    export PATH="$HOME/.bun/bin:$PATH"
    echo "opencode $(opencode --version 2>&1)"
    echo "git $(git --version 2>&1 | head -1)"
    echo "jq $(jq --version 2>&1)"
    echo "::endgroup::"
    
    # --- step 2: clone or refresh workspace for context-reading
    echo "::group:: workspace"
    cd "$WORKSPACE"
    if [[ ! -d .git ]]; then
        git clone --depth 1 "$REPO_URL" .
    else
        git fetch --depth 1 origin main && git reset --hard origin/main
    fi
    cp /opt/payload/opencode.json ./opencode.json
    mkdir -p .git/info
    grep -qxF "opencode.json" .git/info/exclude 2>/dev/null || echo "opencode.json" >> .git/info/exclude
    grep -qxF ".opencode.log" .git/info/exclude 2>/dev/null || echo ".opencode.log" >> .git/info/exclude
    echo "head: $(git rev-parse HEAD)"
    echo "::endgroup::"
    
    # --- step 3: run opencode against the review prompt
    echo "::group:: opencode run"
    DIFF_SIZE=$(wc -l < "$PR_DATA_PATH/diff.patch")
    echo "diff lines: $DIFF_SIZE"
    PROMPT=$(cat <<PROMPT_EOF
    You are a strict but fair PR reviewer for the nas2 single-node k3s
    homelab. The repo's contribution guidelines are in AGENTS.md (auto-
    discovered from cwd) and its memory file CLAUDE.md.
    
    You will be given:
      (a) the original GitHub issue body — the SPEC the PR must satisfy,
      (b) the PR title and body,
      (c) the PR's unified diff.
    
    Your job: decide APPROVED or CHANGES_REQUESTED. Be specific.
    
    Review criteria (block on any failure):
      1. The diff resolves the spec in (a). If it doesn't, CHANGES_REQUESTED.
      2. TDD: the diff MUST touch at least one file under tests/. Otherwise
         CHANGES_REQUESTED.
      3. No edits to PROTECTED paths: .github/, group_vars/, .vault_pass,
         playbook.yml, .claude/, roles/argocd_bootstrap/, or any of the
         agent-loop component manifests under gitops/manifests/
         (litellm, hermes, sm-operator, gpu-operator, github-app,
         issue-creator, argocd, metallb, tailscale-operator,
         alertmanager-shim, dev-agent, pr-pusher, pr-reviewer,
         pr-reviewer-poster, agent-controller). If touched,
         CHANGES_REQUESTED with reason "protected path: <path>".
      4. Scope cap: <=500 LOC, <=20 files. If exceeded, CHANGES_REQUESTED.
      5. Sanity check: no obvious bugs, no broken YAML, no test file that
         trivially asserts "true".
    
    Output ONLY a JSON object on the LAST LINE of your reply (no fences,
    no commentary after it). Schema:
      {
        "verdict": "APPROVED" | "CHANGES_REQUESTED",
        "summary": "<one-paragraph why>",
        "blocking_issues": ["<short bullet>", ...],
        "comments": [{"path": "<file>", "line": <int>, "body": "<text>"}]
      }
    "comments" may be []. "blocking_issues" must be non-empty if
    verdict=CHANGES_REQUESTED, empty if APPROVED.
    
    --- ORIGINAL ISSUE (the spec) ---
    $(cat "$PR_DATA_PATH/issue.md")
    
    --- PR TITLE AND BODY ---
    $(cat "$PR_DATA_PATH/pr.md")
    
    --- PR DIFF (unified) ---
    $(cat "$PR_DATA_PATH/diff.patch")
    PROMPT_EOF
    )
    
    set +e
    opencode run \
        --model "$MODEL" \
        --dangerously-skip-permissions \
        "$PROMPT" 2>&1 | tee "$WORKSPACE/.opencode.log"
    opencode_exit=$?
    set -e
    echo "opencode exit=$opencode_exit"
    echo "::endgroup::"
    
    # --- step 4: extract + validate the JSON verdict
    echo "::group:: extract verdict"
    # Find the last line that parses as a JSON object with a "verdict" key.
    # Walk the log bottom-up.
    REVIEW_JSON=""
    while IFS= read -r line; do
        case "$line" in
            *'{'*'}'*)
                candidate=$(echo "$line" | grep -oE '\{.*\}' | tail -1 || true)
                if [[ -n "$candidate" ]] && echo "$candidate" | jq -e 'has("verdict")' >/dev/null 2>&1; then
                    REVIEW_JSON="$candidate"
                    break
                fi
                ;;
        esac
    done < <(tac "$WORKSPACE/.opencode.log")
    
    if [[ -z "$REVIEW_JSON" ]]; then
        echo "FATAL: no JSON verdict found in opencode output" >&2
        tail -40 "$WORKSPACE/.opencode.log" > "$WORKSPACE/.review.summary"
        exit 4
    fi
    VERDICT=$(echo "$REVIEW_JSON" | jq -r .verdict)
    if [[ "$VERDICT" != "APPROVED" && "$VERDICT" != "CHANGES_REQUESTED" ]]; then
        echo "FATAL: invalid verdict value: $VERDICT" >&2
        exit 5
    fi
    echo "$REVIEW_JSON" | jq . > "$WORKSPACE/.review.json"
    tail -40 "$WORKSPACE/.opencode.log" > "$WORKSPACE/.review.summary"
    echo "verdict: $VERDICT"
    echo "::endgroup::"
    
    if [[ "$opencode_exit" -ne 0 ]]; then
        echo "FATAL: opencode exited $opencode_exit (verdict was extracted but run failed)" >&2
        exit "$opencode_exit"
    fi
    echo "pr-reviewer: success — .review.json written"
    echo "::group:: review dump"
    cat "$WORKSPACE/.review.json"
    echo "::endgroup::"
  opencode.json: |
    {
      "$schema": "https://opencode.ai/config.json",
      "provider": {
        "litellm": {
          "npm": "@ai-sdk/openai-compatible",
          "name": "LiteLLM",
          "options": {
            "baseURL": "{env:OPENAI_BASE_URL}",
            "apiKey": "{env:OPENAI_API_KEY}"
          },
          "models": {
            "gemma4:e4b": {},
            "qwen3-coder-next:latest": {},
            "qwen3:4b-instruct-2507-q8_0": {}
          }
        }
      }
    }
