---
# sm-operator materializes this into a Secret named `webhook-hmac` in the
# github-app namespace, consumed by the issue-creator Deployment via
# envFrom to validate Hermes's HMAC-signed POSTs.
#
# The bw-auth-token Secret in this namespace already exists (seeded by
# argocd_bootstrap Ansible role; `github-app` was added to
# bitwarden_namespaces during the Phase 0 GH App wiring).
#
# Same bwSecretId is consumed by hermes/webhook-hmac-secret.yaml in the
# hermes namespace, so both ends of the Hermes ↔ issue-creator channel
# verify with the same shared secret.
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: webhook-hmac
  namespace: github-app
spec:
  organizationId: c046a20a-413d-4b54-8a56-b1790122c5ef
  secretName: webhook-hmac
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: 28a9655e-1d93-45e5-97e9-b44e00035064
      secretKeyName: WEBHOOK_HMAC_SECRET
