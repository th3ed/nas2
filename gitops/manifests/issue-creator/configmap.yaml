---
# AUTO-GENERATED from gitops/manifests/issue-creator/app.py via
# scripts/regen-issue-creator-configmap.py. Do not edit by hand —
# edit app.py and re-run the regen script before committing.
#
# Argo CD applies this ConfigMap; the Deployment mounts it at
# /opt/app/app.py via subPath. A pod restart picks up source changes
# (subPath mounts are frozen at pod-start time).
apiVersion: v1
kind: ConfigMap
metadata:
  name: issue-creator-src
  namespace: github-app
data:
  app.py: |
    """issue-creator — minimal HTTP service that opens GitHub issues on behalf
    of the agent loop.

    Architectural role: a single-purpose narrow surface between Hermes (the
    LLM that may see untrusted text) and the GitHub API. Hermes never gets a
    GitHub credential; this service owns the GitHub App private key, mints
    short-lived (1h) installation tokens, and exposes ONLY one operation:
    "create or comment-bump one well-shaped issue."

    Threat model: assume Hermes can be prompt-injected by an Alertmanager
    label or an Argo CD app name (both flow through gitops, so a malicious or
    buggy PR could craft them). Defense:
      - Constrained API: POST /issues only; reject any other path/method.
      - Strict schema: title/body/labels/dedupe_key; reject anything else.
      - Label allowlist: only `agent:*` and `from:monitoring`/`from:spec-driver`.
      - Length caps: title <= 200, body <= 8000 chars.
      - Server-side dedupe: search for `<!-- dedupe_key: ... -->` in open
        issues; if found, post a "still firing" comment rather than spam.
      - Rate limit: 30 issues/hour hard cap.
      - HMAC verification: requests must be signed with the shared
        WEBHOOK_HMAC_SECRET (same one Alertmanager/Argo CD use to sign their
        POSTs to Hermes — Hermes re-signs to us with the same secret).

    Compromise scenarios:
      - Hermes is compromised → attacker can spam "weird" issues on this one
        repo (rate-limited to 30/hr) but cannot exfiltrate secrets, push
        code, comment on PRs, or read private content.
      - The HMAC secret leaks → external attacker can post issues at the
        same rate cap. Same blast radius.
      - This service is compromised → full GH App permissions in the
        container. Mitigation: read-only filesystem, no shell tools, Image
        pinned by sha256 digest, NetworkPolicy egress allowlist (Phase 3).
    """

    from __future__ import annotations

    import hashlib
    import hmac
    import json
    import logging
    import os
    import re
    import sys
    import time
    from collections import deque
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer
    from threading import Lock
    from typing import Any

    import jwt
    import requests

    LOG = logging.getLogger("issue-creator")
    logging.basicConfig(level=logging.INFO, format="%(asctime)s %(levelname)s %(message)s")

    # --- config ---------------------------------------------------------------

    GH_APP_ID = os.environ["GH_APP_ID"].strip()
    GH_APP_INSTALLATION_ID = os.environ["GH_APP_INSTALLATION_ID"].strip()
    GH_APP_PRIVATE_KEY = os.environ["GH_APP_PRIVATE_KEY"]
    HMAC_SECRET = os.environ["WEBHOOK_HMAC_SECRET"].encode()
    REPO = os.environ.get("REPO", "th3ed/nas2")
    LISTEN_PORT = int(os.environ.get("PORT", "8080"))

    TITLE_MAX = 200
    BODY_MAX = 8000
    ALLOWED_LABEL_PATTERNS = [
        re.compile(r"^agent:[a-z][a-z0-9-]*$"),
        re.compile(r"^from:(monitoring|spec-driver)$"),
    ]
    RATE_LIMIT_PER_HOUR = 30
    DEDUPE_MARKER_RE = re.compile(r"<!-- dedupe_key: ([A-Za-z0-9_:.\-]+) -->")

    # --- token minting --------------------------------------------------------

    _token_cache: dict[str, Any] = {"value": None, "expires_at": 0.0}


    def get_installation_token() -> str:
        """Return a valid installation token, reusing the cached one if it has
        at least 5 minutes of life left. Tokens last 1 hour from GitHub."""
        now = time.time()
        if _token_cache["value"] and _token_cache["expires_at"] - now > 300:
            return _token_cache["value"]
        jwt_token = jwt.encode(
            {"iat": int(now) - 60, "exp": int(now) + 540, "iss": GH_APP_ID},
            GH_APP_PRIVATE_KEY,
            algorithm="RS256",
        )
        resp = requests.post(
            f"https://api.github.com/app/installations/{GH_APP_INSTALLATION_ID}/access_tokens",
            headers={
                "Authorization": f"Bearer {jwt_token}",
                "Accept": "application/vnd.github+json",
                "X-GitHub-Api-Version": "2022-11-28",
            },
            timeout=20,
        )
        resp.raise_for_status()
        data = resp.json()
        _token_cache["value"] = data["token"]
        _token_cache["expires_at"] = now + 3500  # ~58 min, conservative
        return data["token"]


    # --- rate limiting --------------------------------------------------------

    _recent_creates: deque[float] = deque(maxlen=RATE_LIMIT_PER_HOUR + 1)
    _rate_lock = Lock()


    def rate_limit_check() -> bool:
        now = time.time()
        with _rate_lock:
            while _recent_creates and now - _recent_creates[0] > 3600:
                _recent_creates.popleft()
            if len(_recent_creates) >= RATE_LIMIT_PER_HOUR:
                return False
            _recent_creates.append(now)
            return True


    # --- validation -----------------------------------------------------------


    def validate_payload(payload: dict[str, Any]) -> tuple[bool, str]:
        if not isinstance(payload, dict):
            return False, "payload must be a JSON object"
        for k in ("title", "body", "labels", "dedupe_key"):
            if k not in payload:
                return False, f"missing key: {k}"
        if not isinstance(payload["title"], str) or not (1 <= len(payload["title"]) <= TITLE_MAX):
            return False, f"title must be a 1..{TITLE_MAX} char string"
        if not isinstance(payload["body"], str) or len(payload["body"]) > BODY_MAX:
            return False, f"body must be a string of <= {BODY_MAX} chars"
        if not isinstance(payload["labels"], list) or not all(isinstance(x, str) for x in payload["labels"]):
            return False, "labels must be a list of strings"
        for label in payload["labels"]:
            if not any(p.match(label) for p in ALLOWED_LABEL_PATTERNS):
                return False, f"label not allowed: {label!r}"
        dk = payload["dedupe_key"]
        if not isinstance(dk, str) or not re.match(r"^[A-Za-z0-9_:.\-]{1,200}$", dk):
            return False, "dedupe_key must match [A-Za-z0-9_:.-]{1,200}"
        return True, ""


    # --- GitHub interaction ---------------------------------------------------


    def gh_headers() -> dict[str, str]:
        return {
            "Authorization": f"Bearer {get_installation_token()}",
            "Accept": "application/vnd.github+json",
            "X-GitHub-Api-Version": "2022-11-28",
        }


    def find_open_issue_by_dedupe_key(dedupe_key: str) -> int | None:
        """Return issue number if an open issue body contains the marker."""
        # GitHub's issue search doesn't index inside <!-- --> comments
        # reliably, so we list open agent issues and scan locally. Cap at one
        # page (30 results) — if there are >30 open agent issues, the human
        # has bigger problems than dedupe.
        resp = requests.get(
            f"https://api.github.com/repos/{REPO}/issues",
            headers=gh_headers(),
            params={"state": "open", "labels": "from:monitoring", "per_page": 30},
            timeout=20,
        )
        resp.raise_for_status()
        marker = f"<!-- dedupe_key: {dedupe_key} -->"
        for issue in resp.json():
            if "pull_request" in issue:
                continue
            if marker in (issue.get("body") or ""):
                return int(issue["number"])
        return None


    def bump_existing_issue(issue_number: int, summary: str) -> None:
        requests.post(
            f"https://api.github.com/repos/{REPO}/issues/{issue_number}/comments",
            headers=gh_headers(),
            json={"body": f"Still firing.\n\n{summary}\n\n_Posted by issue-creator._"},
            timeout=20,
        ).raise_for_status()


    def create_issue(title: str, body: str, labels: list[str], dedupe_key: str) -> int:
        annotated_body = f"{body}\n\n<!-- dedupe_key: {dedupe_key} -->"
        resp = requests.post(
            f"https://api.github.com/repos/{REPO}/issues",
            headers=gh_headers(),
            json={"title": title, "body": annotated_body, "labels": labels},
            timeout=20,
        )
        resp.raise_for_status()
        return int(resp.json()["number"])


    # --- HTTP handler ---------------------------------------------------------


    class Handler(BaseHTTPRequestHandler):
        def log_message(self, fmt: str, *args: Any) -> None:  # noqa: A003
            LOG.info("%s - %s", self.address_string(), fmt % args)

        def _respond(self, code: int, payload: dict[str, Any]) -> None:
            body = json.dumps(payload).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self) -> None:  # noqa: N802
            if self.path == "/health":
                self._respond(200, {"ok": True})
                return
            self._respond(404, {"error": "not found"})

        def do_POST(self) -> None:  # noqa: N802
            if self.path != "/issues":
                self._respond(404, {"error": "not found"})
                return
            length = int(self.headers.get("Content-Length") or 0)
            if length > 64 * 1024:
                self._respond(413, {"error": "payload too large"})
                return
            raw = self.rfile.read(length)
            sig_header = self.headers.get("X-Hub-Signature-256") or ""
            if not sig_header.startswith("sha256="):
                self._respond(401, {"error": "missing X-Hub-Signature-256"})
                return
            expected = "sha256=" + hmac.new(HMAC_SECRET, raw, hashlib.sha256).hexdigest()
            if not hmac.compare_digest(sig_header, expected):
                self._respond(401, {"error": "bad signature"})
                return
            try:
                payload = json.loads(raw)
            except json.JSONDecodeError:
                self._respond(400, {"error": "invalid JSON"})
                return
            ok, err = validate_payload(payload)
            if not ok:
                self._respond(400, {"error": err})
                return
            if not rate_limit_check():
                self._respond(429, {"error": "rate limit: 30/hour"})
                return
            try:
                existing = find_open_issue_by_dedupe_key(payload["dedupe_key"])
                if existing is not None:
                    bump_existing_issue(existing, payload["title"])
                    self._respond(200, {"action": "bumped", "issue": existing})
                    return
                number = create_issue(
                    payload["title"], payload["body"], payload["labels"], payload["dedupe_key"]
                )
                self._respond(201, {"action": "created", "issue": number})
            except requests.HTTPError as exc:
                LOG.error("github HTTPError: %s body=%s", exc, exc.response.text[:300])
                self._respond(502, {"error": "github call failed"})
            except Exception as exc:  # noqa: BLE001
                LOG.exception("unhandled error")
                self._respond(500, {"error": "internal error", "detail": str(exc)[:200]})


    def main() -> None:
        LOG.info("issue-creator starting on port %d, repo=%s", LISTEN_PORT, REPO)
        # Warm the token cache once at startup; fail loudly if GH App auth is broken
        try:
            get_installation_token()
            LOG.info("warmed GH App installation token")
        except Exception:
            LOG.exception("startup token mint failed — exiting")
            sys.exit(1)
        server = ThreadingHTTPServer(("0.0.0.0", LISTEN_PORT), Handler)
        server.serve_forever()


    if __name__ == "__main__":
        main()
