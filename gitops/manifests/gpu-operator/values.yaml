---
driver:
  enabled: false

toolkit:
  enabled: false

devicePlugin:
  config:
    name: time-slicing-config
    default: any

dcgmExporter:
  enabled: true
  serviceMonitor:
    enabled: true

nodeStatusExporter:
  enabled: true

operator:
  defaultRuntime: containerd

# Match the value the CRD defaults to after apply, so the helm-rendered
# manifest doesn't drift against the live ClusterPolicy spec.
migManager:
  config:
    name: default-mig-parted-config
