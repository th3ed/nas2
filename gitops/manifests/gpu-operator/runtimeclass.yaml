---
# Cluster-scoped RuntimeClass for the NVIDIA container runtime.
# k3s auto-detects nvidia-container-runtime on PATH and registers it in
# containerd, but does NOT create the RuntimeClass object. Pods that opt into
# the nvidia runtime via `runtimeClassName: nvidia` need this to schedule.
# (Pods that only request `nvidia.com/gpu` resources also work because the
# device plugin handles runtime selection — but explicit is safer.)
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: nvidia
handler: nvidia
