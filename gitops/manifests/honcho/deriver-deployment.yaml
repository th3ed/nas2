---
# Honcho deriver — the background worker that processes the message queue
# and extracts user-model facts via LLM calls. Same image as the api,
# different command (`uv run python -m src.deriver` per upstream
# docker-compose.yml.example). No HTTP port; reads from the DB queue.
#
# All env mirrors honcho-api so the deriver shares the same DB connection
# and LLM routing. The deriver inherits the same Qwen3.5 reliability
# ceiling documented on the api deployment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: honcho-deriver
  namespace: honcho
  labels:
    app.kubernetes.io/name: honcho-deriver
    app.kubernetes.io/component: deriver
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: honcho-deriver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: honcho-deriver
        app.kubernetes.io/component: deriver
    spec:
      containers:
        - name: honcho-deriver
          # Same image as honcho-api — see api-deployment.yaml for the pre-release
          # rationale (Hermes plugin requires /v3/*, v2.0.3 only has /v2/*).
          image: ghcr.io/plastic-labs/honcho:latest@sha256:6942f481cbcfb57ba0fffbd39399fa8ab6eb755a2d5113ee1258cd487a9d7271
          imagePullPolicy: IfNotPresent
          # docker-compose.yml.example uses `uv run python -m src.deriver`,
          # but `uv run` at runtime triggers a workspace sync that fails
          # because the workspace member dirs (sdks/python, honcho-cli)
          # aren't copied into the image. Bypass uv: the pre-built venv at
          # /app/.venv already has everything python -m src.deriver needs.
          command: ["/app/.venv/bin/python", "-m", "src.deriver"]
          envFrom:
            - secretRef:
                name: honcho-secrets
                optional: false
          env:
            - name: DB_CONNECTION_URI
              value: postgresql+psycopg://honcho:$(POSTGRES_PASSWORD)@honcho-postgres.honcho:5432/honcho
            - name: AUTH_USE_AUTH
              value: "false"
            - name: LLM_OPENAI_API_KEY
              value: $(LITELLM_API_KEY)
            - name: LLM_OPENAI_COMPATIBLE_API_KEY
              value: $(LITELLM_API_KEY)
            - name: LLM_OPENAI_COMPATIBLE_BASE_URL
              value: http://litellm.litellm:4000/v1
            - name: OPENAI_API_KEY
              value: $(LITELLM_API_KEY)
            - name: OPENAI_BASE_URL
              value: http://litellm.litellm:4000/v1
            # See api-deployment.yaml for the v3 nested-env rationale.
            - name: DERIVER_MODEL_CONFIG__TRANSPORT
              value: openai
            - name: DERIVER_MODEL_CONFIG__MODEL
              value: qwen3.5:9b
            - name: DERIVER_MODEL_CONFIG__OVERRIDES__BASE_URL
              value: http://litellm.litellm:4000/v1
            # See api-deployment.yaml — all 5 ReasoningLevel keys required.
            - name: DIALECTIC_LEVELS__MINIMAL__MODEL_CONFIG__TRANSPORT
              value: openai
            - name: DIALECTIC_LEVELS__MINIMAL__MODEL_CONFIG__MODEL
              value: qwen3.5:9b
            - name: DIALECTIC_LEVELS__MINIMAL__MODEL_CONFIG__OVERRIDES__BASE_URL
              value: http://litellm.litellm:4000/v1
            - name: DIALECTIC_LEVELS__LOW__MODEL_CONFIG__TRANSPORT
              value: openai
            - name: DIALECTIC_LEVELS__LOW__MODEL_CONFIG__MODEL
              value: qwen3.5:9b
            - name: DIALECTIC_LEVELS__LOW__MODEL_CONFIG__OVERRIDES__BASE_URL
              value: http://litellm.litellm:4000/v1
            - name: DIALECTIC_LEVELS__MEDIUM__MODEL_CONFIG__TRANSPORT
              value: openai
            - name: DIALECTIC_LEVELS__MEDIUM__MODEL_CONFIG__MODEL
              value: qwen3.5:9b
            - name: DIALECTIC_LEVELS__MEDIUM__MODEL_CONFIG__OVERRIDES__BASE_URL
              value: http://litellm.litellm:4000/v1
            - name: DIALECTIC_LEVELS__HIGH__MODEL_CONFIG__TRANSPORT
              value: openai
            - name: DIALECTIC_LEVELS__HIGH__MODEL_CONFIG__MODEL
              value: qwen3.5:9b
            - name: DIALECTIC_LEVELS__HIGH__MODEL_CONFIG__OVERRIDES__BASE_URL
              value: http://litellm.litellm:4000/v1
            - name: DIALECTIC_LEVELS__MAX__MODEL_CONFIG__TRANSPORT
              value: openai
            - name: DIALECTIC_LEVELS__MAX__MODEL_CONFIG__MODEL
              value: qwen3.5:9b
            - name: DIALECTIC_LEVELS__MAX__MODEL_CONFIG__OVERRIDES__BASE_URL
              value: http://litellm.litellm:4000/v1
            - name: SUMMARY_MODEL_CONFIG__TRANSPORT
              value: openai
            - name: SUMMARY_MODEL_CONFIG__MODEL
              value: qwen3.5:9b
            - name: SUMMARY_MODEL_CONFIG__OVERRIDES__BASE_URL
              value: http://litellm.litellm:4000/v1
            - name: EMBEDDING_VECTOR_DIMENSIONS
              value: "768"
            - name: EMBEDDING_MODEL_CONFIG__TRANSPORT
              value: openai
            - name: EMBEDDING_MODEL_CONFIG__MODEL
              value: text-embedding-3-small
            - name: EMBEDDING_MODEL_CONFIG__OVERRIDES__BASE_URL
              value: http://litellm.litellm:4000/v1
            - name: LOG_LEVEL
              value: INFO
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
