---
# Postgres + pgvector backing store for Honcho. Image
# `pgvector/pgvector:pg15` matches upstream Honcho's docker-compose.yml.example
# (https://github.com/plastic-labs/honcho/blob/v2.0.3/docker-compose.yml.example)
# verbatim — same image tag Plastic Labs runs in their integration tests.
# Mirrors the mem0-postgres StatefulSet shape (explicit apiserver defaults
# to dodge Argo SSA drift on every reconcile).
apiVersion: v1
kind: Service
metadata:
  name: honcho-postgres
  namespace: honcho
spec:
  selector:
    app.kubernetes.io/name: honcho-postgres
  ports:
    - name: pg
      port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: honcho-postgres
  namespace: honcho
  labels:
    app.kubernetes.io/name: honcho-postgres
spec:
  serviceName: honcho-postgres
  replicas: 1
  podManagementPolicy: OrderedReady
  revisionHistoryLimit: 10
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: honcho-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: honcho-postgres
    spec:
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgres
          image: pgvector/pgvector:pg15
          imagePullPolicy: IfNotPresent
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          ports:
            - name: pg
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: honcho
            - name: POSTGRES_DB
              value: honcho
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: honcho-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "honcho", "-d", "honcho"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "honcho", "-d", "honcho"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 1Gi
      volumes:
        - name: init
          configMap:
            name: honcho-postgres-init
            defaultMode: 420
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 128Mi
  volumeClaimTemplates:
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        volumeMode: Filesystem
        resources:
          requests:
            storage: 5Gi
