---
# Bitwarden Secrets Manager → Kubernetes Secret mapping for the Honcho stack.
# The bw-auth-token Secret is pre-created in this namespace by the
# argocd_bootstrap Ansible role (honcho is in roles/argocd_bootstrap/defaults/
# main.yml `bitwarden_namespaces`). Re-run `make apply-tags TAGS=argocd`
# after the first commit of this file so the auth-token Secret exists
# before sm-operator first tries to reconcile.
#
# LITELLM_API_KEY reuses the same Bitwarden entry as mem0/openclaw/hermes —
# one upstream secret, now four consumers. POSTGRES_PASSWORD is a fresh
# random hex-32 minted just for Honcho.
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: honcho-secrets
  namespace: honcho
spec:
  organizationId: c046a20a-413d-4b54-8a56-b1790122c5ef
  secretName: honcho-secrets
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: 45082ec0-8a04-43b0-ae05-b46c005683e5
      secretKeyName: POSTGRES_PASSWORD
    - bwSecretId: 53904946-84fc-46dd-858b-b446001ff47a
      secretKeyName: LITELLM_API_KEY
