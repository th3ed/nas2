---
# Honcho API server — the upstream-published image at
# `ghcr.io/plastic-labs/honcho:v2.0.3` (multi-arch, attested by their
# `.github/workflows/docker-build.yml`). Pinned to a tagged release rather
# than `:latest` so reconciles are reproducible; Renovate tracks Honcho's
# v* tags and opens PRs for bumps.
#
# Architecture mirrors upstream docker-compose.yml.example: this Deployment
# is the FastAPI server (default entrypoint), the deriver Deployment runs
# `uv run python -m src.deriver` against the same DB. No Redis — v2.0.3's
# compose doesn't include one.
#
# Auth: AUTH_USE_AUTH defaults to false in upstream's config.py — explicit
# here for clarity. The network (cluster ClusterIP + Tailscale namespace
# scoping) IS the auth boundary in this homelab; Honcho only listens
# inside the cluster.
#
# LLM routing: Honcho's deriver / dialectic / summary / query-generation
# all need an LLM. We point them at our in-cluster LiteLLM proxy via
# `LLM_OPENAI_COMPATIBLE_BASE_URL` (Honcho's own config knob, see
# src/config.py LLMSettings) AND the bare `OPENAI_BASE_URL` env var that
# the openai-python SDK reads at client-construction time (belt + suspenders
# in case Honcho's openai-compatible path uses one or the other). Every
# section is set to provider=openai + model=qwen3.5:9b so all LLM calls
# go through our local Qwen3.5 via LiteLLM.
#
# Reliability caveat: documented community threshold for Honcho's deriver
# is >=14B for reliable function-calling. Qwen3.5 9B is below that — see
# CLAUDE.md gotcha. Same ceiling that bit mem0's fact extraction;
# accepted per user direction.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: honcho-api
  namespace: honcho
  labels:
    app.kubernetes.io/name: honcho-api
    app.kubernetes.io/component: api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: honcho-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: honcho-api
        app.kubernetes.io/component: api
    spec:
      initContainers:
        # Honcho upstream doesn't auto-run Alembic on startup — the api
        # server CMD is `fastapi run --host 0.0.0.0 src/main.py`, no
        # migrations step. The docker-compose.yml.example also doesn't
        # show one (verified at v2.0.3 contents). So we run them ourselves
        # before the api starts: same image, same DB env, just a different
        # entrypoint. Alembic is idempotent — re-running on an
        # up-to-date schema is a no-op.
        - name: migrate
          # Pre-release pin — user-authorized override (2026-06-17). Plastic Labs
          # has not cut a v3.x semver tag yet (last tagged release is v2.0.3, which
          # only mounts /v2/* routes); Hermes's bundled Honcho plugin calls
          # POST /v3/workspaces. This digest is :latest as of 2026-06-15 main HEAD
          # aa993a6d ("Release Candidate for v3.0.10"), which exposes /v3/*.
          # Renovate-tracked: when plastic-labs/honcho cuts a v3.x release, swap
          # this for the stable tag. See feedback_pin_stable_tags.md memory for the
          # default "stable-only" rule and the exception path used here.
          image: ghcr.io/plastic-labs/honcho:latest@sha256:6942f481cbcfb57ba0fffbd39399fa8ab6eb755a2d5113ee1258cd487a9d7271
          imagePullPolicy: IfNotPresent
          # Use the pre-built venv directly. The Dockerfile ships uv 0.9.24
          # and runs `uv sync --frozen` at build time to populate /app/.venv,
          # but Honcho's pyproject.toml has `tool.uv.workspace.members:
          # [sdks/python, honcho-cli]` and `tool.uv.sources` pointing to those
          # workspace members — none of which are copied into the image
          # (`COPY src/ migrations/ scripts/ docker/ alembic.ini config.toml*`
          # only). `uv run ...` at runtime triggers a sync that fails with
          # "honcho-ai references a workspace ... not a workspace member"
          # because the member dirs don't exist on disk. The pre-built venv
          # already has alembic installed; bypass uv entirely.
          command: ["/app/.venv/bin/alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: honcho-secrets
                optional: false
          env:
            - name: DB_CONNECTION_URI
              value: postgresql+psycopg://honcho:$(POSTGRES_PASSWORD)@honcho-postgres.honcho:5432/honcho
      containers:
        - name: honcho
          # Pre-release pin — see migrate initContainer above for rationale.
          image: ghcr.io/plastic-labs/honcho:latest@sha256:6942f481cbcfb57ba0fffbd39399fa8ab6eb755a2d5113ee1258cd487a9d7271
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: honcho-secrets
                optional: false
          env:
            # Database — upstream requires the psycopg-prefixed SQLAlchemy
            # URI shape; the $(VAR) interpolation picks up POSTGRES_PASSWORD
            # from the envFrom-injected honcho-secrets.
            - name: DB_CONNECTION_URI
              value: postgresql+psycopg://honcho:$(POSTGRES_PASSWORD)@honcho-postgres.honcho:5432/honcho
            - name: AUTH_USE_AUTH
              value: "false"
            # OpenAI-compatible routing to our LiteLLM proxy.
            - name: LLM_OPENAI_API_KEY
              value: $(LITELLM_API_KEY)
            - name: LLM_OPENAI_COMPATIBLE_API_KEY
              value: $(LITELLM_API_KEY)
            - name: LLM_OPENAI_COMPATIBLE_BASE_URL
              value: http://litellm.litellm:4000/v1
            # openai-python SDK reads these directly when constructing
            # its default client; covers code paths that bypass Honcho's
            # own LLM_OPENAI_COMPATIBLE_BASE_URL plumbing.
            - name: OPENAI_API_KEY
              value: $(LITELLM_API_KEY)
            - name: OPENAI_BASE_URL
              value: http://litellm.litellm:4000/v1
            # Honcho v3 uses nested per-section MODEL_CONFIG envs (the old v2
            # LLM_<SECTION>_PROVIDER/MODEL pattern was removed at v3).
            # Each section's transport=openai + model=qwen3.5:9b routes
            # everything through our LiteLLM. OVERRIDES__BASE_URL is what
            # the openai client uses to find LiteLLM.
            - name: DERIVER_MODEL_CONFIG__TRANSPORT
              value: openai
            - name: DERIVER_MODEL_CONFIG__MODEL
              value: qwen3.5:9b
            - name: DERIVER_MODEL_CONFIG__OVERRIDES__BASE_URL
              value: http://litellm.litellm:4000/v1
            # DialecticSettings.LEVELS is a dict keyed by ReasoningLevel
            # literals {minimal, low, medium, high, max}; pydantic validates
            # the keys and requires ALL five present after merge. Overriding
            # only "base" was a guess and pydantic rejected it. Override the
            # MODEL_CONFIG on every level so dialectic calls don't fall
            # through to the gpt-5.4-mini default (which isn't in our
            # LiteLLM catalog).
            - name: DIALECTIC_LEVELS__MINIMAL__MODEL_CONFIG__TRANSPORT
              value: openai
            - name: DIALECTIC_LEVELS__MINIMAL__MODEL_CONFIG__MODEL
              value: qwen3.5:9b
            - name: DIALECTIC_LEVELS__MINIMAL__MODEL_CONFIG__OVERRIDES__BASE_URL
              value: http://litellm.litellm:4000/v1
            - name: DIALECTIC_LEVELS__LOW__MODEL_CONFIG__TRANSPORT
              value: openai
            - name: DIALECTIC_LEVELS__LOW__MODEL_CONFIG__MODEL
              value: qwen3.5:9b
            - name: DIALECTIC_LEVELS__LOW__MODEL_CONFIG__OVERRIDES__BASE_URL
              value: http://litellm.litellm:4000/v1
            - name: DIALECTIC_LEVELS__MEDIUM__MODEL_CONFIG__TRANSPORT
              value: openai
            - name: DIALECTIC_LEVELS__MEDIUM__MODEL_CONFIG__MODEL
              value: qwen3.5:9b
            - name: DIALECTIC_LEVELS__MEDIUM__MODEL_CONFIG__OVERRIDES__BASE_URL
              value: http://litellm.litellm:4000/v1
            - name: DIALECTIC_LEVELS__HIGH__MODEL_CONFIG__TRANSPORT
              value: openai
            - name: DIALECTIC_LEVELS__HIGH__MODEL_CONFIG__MODEL
              value: qwen3.5:9b
            - name: DIALECTIC_LEVELS__HIGH__MODEL_CONFIG__OVERRIDES__BASE_URL
              value: http://litellm.litellm:4000/v1
            - name: DIALECTIC_LEVELS__MAX__MODEL_CONFIG__TRANSPORT
              value: openai
            - name: DIALECTIC_LEVELS__MAX__MODEL_CONFIG__MODEL
              value: qwen3.5:9b
            - name: DIALECTIC_LEVELS__MAX__MODEL_CONFIG__OVERRIDES__BASE_URL
              value: http://litellm.litellm:4000/v1
            - name: SUMMARY_MODEL_CONFIG__TRANSPORT
              value: openai
            - name: SUMMARY_MODEL_CONFIG__MODEL
              value: qwen3.5:9b
            - name: SUMMARY_MODEL_CONFIG__OVERRIDES__BASE_URL
              value: http://litellm.litellm:4000/v1
            # Embeddings: nomic-embed-text via the existing LiteLLM
            # `text-embedding-3-small` alias is 768-dim, NOT the OpenAI
            # default 1536. VECTOR_DIMENSIONS sets the pgvector column
            # shape (only effective on a clean DB — schema is locked at
            # initial migrate).
            - name: EMBEDDING_VECTOR_DIMENSIONS
              value: "768"
            - name: EMBEDDING_MODEL_CONFIG__TRANSPORT
              value: openai
            - name: EMBEDDING_MODEL_CONFIG__MODEL
              value: text-embedding-3-small
            - name: EMBEDDING_MODEL_CONFIG__OVERRIDES__BASE_URL
              value: http://litellm.litellm:4000/v1
            - name: FASTAPI_HOST
              value: 0.0.0.0
            - name: FASTAPI_PORT
              value: "8000"
            - name: LOG_LEVEL
              value: INFO
          readinessProbe:
            # Honcho v2.0.3 has no /health endpoint (verified empirically —
            # only /v2/* routes are mounted; /health, /healthz, /v1/health
            # all 404). tcpSocket on the bound port is the correct shape:
            # the uvicorn process is up = the FastAPI app is reachable.
            # Same pattern mem0-mcp used for its streamable-http server.
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
