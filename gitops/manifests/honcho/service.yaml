---
# ClusterIP for the Honcho api server. In-cluster consumers (Hermes,
# future Claude Code / OpenCode if we add the cross-agent MCP path)
# resolve `api.honcho:8000`.
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: honcho
  labels:
    app.kubernetes.io/name: honcho-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: honcho-api
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
