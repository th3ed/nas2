apiVersion: v2
name: agentregistry
description: Production-grade Helm chart for Agent Registry -- deploy, secure, and scale the open-source platform for curating and managing AI agents, MCP servers, and skills on Kubernetes with bundled PostgreSQL/pgvector
type: application
version: ${CHART_VERSION}
appVersion: "${CHART_VERSION}"
kubeVersion: ">=1.19.0-0"
keywords:
  - agentregistry
  - agents
  - mcp
  - registry
  - ai
  - llm
home: https://github.com/agentregistry-dev/agentregistry
sources:
  - https://github.com/agentregistry-dev/agentregistry
maintainers:
  - name: agentregistry-dev
    url: https://github.com/agentregistry-dev
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Documentation
      url: https://github.com/agentregistry-dev/agentregistry
  artifacthub.io/images: |
    - name: agentregistry
      image: ghcr.io/agentregistry-dev/agentregistry/server:${CHART_VERSION}
    - name: postgresql
      image: docker.io/library/postgres:18
