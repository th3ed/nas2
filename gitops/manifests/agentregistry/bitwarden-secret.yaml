---
# sm-operator materializes this into a Secret named `agentregistry-jwt`
# whose AGENT_REGISTRY_JWT_PRIVATE_KEY value is mounted by the chart-rendered
# Deployment (config.existingSecret = agentregistry-jwt in values.yaml).
# The bw-auth-token Secret is created out-of-band by the argocd_bootstrap
# Ansible role from vault_bitwarden_sm_token.
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: agentregistry-jwt
  namespace: agentregistry
spec:
  organizationId: c046a20a-413d-4b54-8a56-b1790122c5ef
  secretName: agentregistry-jwt
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: 5c62d8e4-da02-41b5-93d0-b4580008763e
      secretKeyName: AGENT_REGISTRY_JWT_PRIVATE_KEY
