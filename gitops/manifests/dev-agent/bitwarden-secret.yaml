---
# LiteLLM master key copy in agents namespace. Bitwarden secret value
# is the same key Hermes consumes (litellm-secrets.LITELLM_MASTER_KEY)
# — sm-operator materializes it into the `litellm-master` Secret here,
# from which dev-agent and pr-reviewer Jobs envFrom into
# OPENAI_API_KEY. LiteLLM accepts the master_key directly on
# /v1/chat/completions without DB-backed key validation.
#
# This is intentionally the FULL master key, not a virtual key, until
# LiteLLM's DB is deployed (Phase 3) and we can mint scoped keys with
# per-day budgets. The current cost gate is: (a) wrapper script hardcodes
# free local models only, and (b) NetworkPolicy (Phase 3) will block
# egress to anything other than litellm.litellm:4000.
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: litellm-master
  namespace: agents
spec:
  organizationId: c046a20a-413d-4b54-8a56-b1790122c5ef
  secretName: litellm-master
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: 53904946-84fc-46dd-858b-b446001ff47a
      secretKeyName: OPENAI_API_KEY
