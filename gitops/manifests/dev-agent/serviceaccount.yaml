---
# Identity for dev-agent and pr-reviewer Jobs. Currently grants no
# Kubernetes API permissions — Jobs only need to talk to LiteLLM
# (in-cluster Service) and clone from github.com (read-only over
# HTTPS via the unprivileged path; the App-token-holding Jobs are
# separate identities). Productionized RBAC (Role for qa-namespace
# get/list/create/delete on Pods/ConfigMaps/Secrets) comes after
# qa namespace is built.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dev-agent
  namespace: agents
automountServiceAccountToken: false
