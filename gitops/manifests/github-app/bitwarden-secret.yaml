---
# sm-operator materializes this into a real Secret named `github-app-secrets`
# that the token-minting Jobs (issue-poster, pr-pusher, pr-reviewer-poster)
# mount via projected-volume / envFrom.
#
# The bw-auth-token Secret is created in this namespace by the
# argocd_bootstrap Ansible role (roles/argocd_bootstrap/defaults/main.yml
# bitwarden_namespaces list). Re-run `make apply-tags TAGS=argocd` after
# adding the namespace there.
#
# The three Bitwarden secrets back a single GitHub App identity:
#   GH_APP_ID              — integer App ID (from the App's settings page)
#   GH_APP_INSTALLATION_ID — integer Installation ID (from the install URL)
#   GH_APP_PRIVATE_KEY     — full PEM contents incl. BEGIN/END lines
# Together they let a Job mint a 1-hour installation access token via
# POST /app/installations/{id}/access_tokens — no PAT rotation needed.
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: github-app-secrets
  namespace: github-app
spec:
  organizationId: c046a20a-413d-4b54-8a56-b1790122c5ef
  secretName: github-app-secrets
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: 90618a9c-470d-4666-b9ef-b44d017fc7ee
      secretKeyName: GH_APP_ID
    - bwSecretId: 8cd80276-d2f6-4c5f-b980-b44d0180e09a
      secretKeyName: GH_APP_INSTALLATION_ID
    - bwSecretId: 6ab9b7a8-165b-455d-8de1-b44d01811863
      secretKeyName: GH_APP_PRIVATE_KEY
