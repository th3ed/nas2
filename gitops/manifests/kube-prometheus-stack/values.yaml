---
fullnameOverride: kps

grafana:
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  # The tailnet IS the auth boundary — Grafana is exposed only via the Tailscale
  # Operator's Ingress (grafana.taile9c9c.ts.net). Drop the login form and grant
  # Admin to anonymous so the in-network experience matches openclaw/ollama.
  # Admin credentials in the existingSecret remain as an emergency fallback.
  grafana.ini:
    auth:
      disable_login_form: true
    auth.anonymous:
      enabled: true
      org_role: Admin
    users:
      allow_sign_up: false
  defaultDashboardsEnabled: true
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL
    datasources:
      enabled: true
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-gateway.monitoring.svc.cluster.local
      access: proxy
  # Grafana fetches these dashboard JSONs from grafana.com once at startup
  # (cluster has internet egress) and provisions them into the default folder.
  # Pin revisions so an upstream republish can't silently change panels.
  dashboards:
    default:
      nvidia-dcgm:
        # NVIDIA DCGM Exporter Dashboard — GPU utilization, memory, power,
        # SM activity, temp, throttling. Pairs with the dcgm-exporter
        # ServiceMonitor enabled in the gpu-operator chart values.
        gnetId: 12239
        revision: 2
        datasource: Prometheus
      loki-logs:
        # Loki / Promtail / Logs — log rate, errors, top-volume namespaces.
        # Useful for spotting log-pipeline regressions and noisy workloads.
        gnetId: 13407
        revision: 1
        datasource: Prometheus
  service:
    type: ClusterIP

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    retention: 15d
    resources:
      requests:
        memory: 1Gi
      limits:
        memory: 4Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 50Gi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 5Gi
