---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-proxy-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  llm-proxy-dashboard.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "title": "Total Requests/sec",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(litellm_proxy_total_requests_metric_total[1m])",
              "refId": "A",
              "legendFormat": "Total"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "reqps",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "unit": "reqps"
        },
        {
          "title": "Failed Requests/sec",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(litellm_proxy_failed_requests_metric_total[1m])",
              "refId": "A",
              "legendFormat": "Failed"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "reqps",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "unit": "reqps"
        },
        {
          "title": "Requests by Model",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(litellm_proxy_total_requests_metric_total[1m])",
              "refId": "A",
              "legendFormat": "{{requested_model}}"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "reqps",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "unit": "reqps"
        },
        {
          "title": "P95 Latency by Model",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, rate(litellm_request_total_latency_metric_bucket[5m]))",
              "refId": "A",
              "legendFormat": "{{requested_model}}"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "s",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "unit": "s"
        },
        {
          "title": "Input Tokens/sec",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(litellm_input_tokens_metric_total[1m])",
              "refId": "A",
              "legendFormat": "{{model}}"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 16
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "tps",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "unit": "tps"
        },
        {
          "title": "Output Tokens/sec",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(litellm_output_tokens_metric_total[1m])",
              "refId": "A",
              "legendFormat": "{{model}}"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 16
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "tps",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "unit": "tps"
        },
        {
          "title": "Deployment Health (0=healthy, 1=partial, 2=down)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "litellm_deployment_state",
              "refId": "A",
              "legendFormat": "{{litellm_model_name}}"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 24
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "none",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "unit": "none"
        },
        {
          "title": "In-Flight Requests",
          "type": "stat",
          "targets": [
            {
              "expr": "litellm_in_flight_requests",
              "refId": "A",
              "legendFormat": "In-flight"
            }
          ],
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 12,
            "y": 24
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "graphMode": "area",
            "colorMode": "value",
            "justifyMode": "auto"
          }
        },
        {
          "title": "Spend per Model ($)",
          "type": "stat",
          "targets": [
            {
              "expr": "litellm_spend_metric",
              "refId": "A",
              "legendFormat": "{{model}}"
            }
          ],
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 18,
            "y": 24
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "currencyUSD",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "graphMode": "area",
            "colorMode": "value",
            "justifyMode": "auto"
          },
          "unit": "currencyUSD"
        },
        {
          "title": "Fallback Events",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(litellm_deployment_successful_fallbacks_total[1m])",
              "refId": "A",
              "legendFormat": "Successful"
            },
            {
              "expr": "rate(litellm_deployment_failed_fallbacks_total[1m])",
              "refId": "A",
              "legendFormat": "Failed"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 28
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "unit": "short"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": [
        "llm",
        "proxy",
        "litellm"
      ],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {
              "isNone": true
            },
            "hide": 0
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "LLM Proxy & Routing",
      "uid": "llm-proxy",
      "version": 0,
      "weekStart": ""
    }
