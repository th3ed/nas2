---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-logs-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  llm-logs-dashboard.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "title": "Ollama Logs",
          "type": "logs",
          "targets": [
            {
              "expr": "{namespace=\"ollama\"} |= \"\"",
              "refId": "A",
              "legendFormat": "",
              "datasource": {
                "type": "loki",
                "uid": "${loki_datasource}"
              }
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "loki",
            "uid": "${loki_datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "showTime": true,
            "wrapLogMessage": false,
            "sortOrder": "Descending",
            "enableLogDetails": true
          }
        },
        {
          "title": "OpenClaw Logs",
          "type": "logs",
          "targets": [
            {
              "expr": "{namespace=\"openclaw\"} |= \"\"",
              "refId": "A",
              "legendFormat": "",
              "datasource": {
                "type": "loki",
                "uid": "${loki_datasource}"
              }
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "datasource": {
            "type": "loki",
            "uid": "${loki_datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "showTime": true,
            "wrapLogMessage": false,
            "sortOrder": "Descending",
            "enableLogDetails": true
          }
        },
        {
          "title": "LiteLLM Logs",
          "type": "logs",
          "targets": [
            {
              "expr": "{namespace=\"litellm\"} |= \"\"",
              "refId": "A",
              "legendFormat": "",
              "datasource": {
                "type": "loki",
                "uid": "${loki_datasource}"
              }
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "datasource": {
            "type": "loki",
            "uid": "${loki_datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "showTime": true,
            "wrapLogMessage": false,
            "sortOrder": "Descending",
            "enableLogDetails": true
          }
        },
        {
          "title": "Error Logs (all LLM namespaces)",
          "type": "logs",
          "targets": [
            {
              "expr": "{namespace=~\"ollama|openclaw|litellm\"} |= \"error\" or \"ERROR\" or \"Exception\" or \"Traceback\"",
              "refId": "A",
              "legendFormat": "",
              "datasource": {
                "type": "loki",
                "uid": "${loki_datasource}"
              }
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "datasource": {
            "type": "loki",
            "uid": "${loki_datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "showTime": true,
            "wrapLogMessage": false,
            "sortOrder": "Descending",
            "enableLogDetails": true
          }
        },
        {
          "title": "Trace Search",
          "type": "logs",
          "targets": [
            {
              "expr": "{namespace=~\"ollama|openclaw|litellm\"} |= \"$trace_id\"",
              "refId": "A",
              "legendFormat": "",
              "datasource": {
                "type": "loki",
                "uid": "${loki_datasource}"
              }
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 16
          },
          "datasource": {
            "type": "loki",
            "uid": "${loki_datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "showTime": true,
            "wrapLogMessage": false,
            "sortOrder": "Descending",
            "enableLogDetails": true
          }
        },
        {
          "title": "Pod Restart Events",
          "type": "logs",
          "targets": [
            {
              "expr": "{namespace=~\"ollama|openclaw|litellm\"} |~ \"BackOff|CrashLoopBackOff|OOMKilled|Evicted\"",
              "refId": "A",
              "legendFormat": "",
              "datasource": {
                "type": "loki",
                "uid": "${loki_datasource}"
              }
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 24
          },
          "datasource": {
            "type": "loki",
            "uid": "${loki_datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "showTime": true,
            "wrapLogMessage": false,
            "sortOrder": "Descending",
            "enableLogDetails": true
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": [
        "llm",
        "logs",
        "loki"
      ],
      "templating": {
        "list": [
          {
            "name": "loki_datasource",
            "type": "datasource",
            "query": "loki",
            "current": {
              "isNone": true
            },
            "hide": 0
          },
          {
            "name": "trace_id",
            "type": "textbox",
            "current": {
              "value": ""
            },
            "label": "Trace ID",
            "hide": 0
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "LLM Logs & Correlation",
      "uid": "llm-logs",
      "version": 0,
      "weekStart": ""
    }
