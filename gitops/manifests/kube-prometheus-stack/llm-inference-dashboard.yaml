---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-inference-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  llm-inference-dashboard.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "title": "Loaded Models",
          "type": "stat",
          "targets": [
            {
              "expr": "loaded_models_count",
              "refId": "A",
              "legendFormat": "Models"
            }
          ],
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 0,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "graphMode": "area",
            "colorMode": "value",
            "justifyMode": "auto"
          }
        },
        {
          "title": "VRAM per Model",
          "type": "stat",
          "targets": [
            {
              "expr": "model_ram_mb",
              "refId": "A",
              "legendFormat": "{{model}}"
            }
          ],
          "gridPos": {
            "h": 4,
            "w": 6,
            "x": 6,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "decmbytes",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "graphMode": "area",
            "colorMode": "value",
            "justifyMode": "auto"
          },
          "unit": "decmbytes"
        },
        {
          "title": "Request Rate",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(request_duration_seconds_count[1m])",
              "refId": "A",
              "legendFormat": "Requests/sec"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "reqps",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "unit": "reqps"
        },
        {
          "title": "Prompt Tokens/sec",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(prompt_tokens_total[1m])",
              "refId": "A",
              "legendFormat": "Prompt tokens/sec"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "tps",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "unit": "tps"
        },
        {
          "title": "Generated Tokens/sec",
          "type": "timeseries",
          "targets": [
            {
              "expr": "rate(generated_tokens_total[1m])",
              "refId": "A",
              "legendFormat": "Generated tokens/sec"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "tps",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "unit": "tps"
        },
        {
          "title": "Request Duration (P95)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, rate(request_duration_seconds_bucket[5m]))",
              "refId": "A",
              "legendFormat": "P95"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 16
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "s",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "unit": "s"
        },
        {
          "title": "Time Per Token",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, rate(time_per_token_bucket[5m]))",
              "refId": "A",
              "legendFormat": "P95 per token"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 16
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "s",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "unit": "s"
        },
        {
          "title": "Model Loaded Status",
          "type": "stat",
          "targets": [
            {
              "expr": "model_loaded",
              "refId": "A",
              "legendFormat": "{{model}}"
            }
          ],
          "gridPos": {
            "h": 4,
            "w": 12,
            "x": 0,
            "y": 24
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "short",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "graphMode": "area",
            "colorMode": "value",
            "justifyMode": "auto"
          }
        },
        {
          "title": "GPU Utilization (DCGM)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_UTIL",
              "refId": "A",
              "legendFormat": "GPU {{gpu}}"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 24
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "spanNulls": false
              },
              "unit": "percentunit",
              "min": 0
            },
            "overrides": []
          },
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            },
            "tooltip": {
              "mode": "single",
              "sort": "none"
            }
          },
          "unit": "percentunit"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": [
        "llm",
        "inference",
        "ollama"
      ],
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {
              "isNone": true
            },
            "hide": 0
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "LLM Inference",
      "uid": "llm-inference",
      "version": 0,
      "weekStart": ""
    }
