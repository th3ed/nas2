---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
    spec:
      runtimeClassName: nvidia
      initContainers:
        # Seed openclaw's auth-profiles.json declaratively. openclaw requires a
        # profile entry whose `provider` matches the model provider id and a
        # valid API key; absent it, model invocation fails with
        # `No API key found for provider "litellm"`. The LITELLM_API_KEY is
        # the LiteLLM master key from Bitwarden, injected via envFrom below.
        # Schema source: AuthProfileStore reader in /app/dist/profiles-*.js
        # (v1 store with `profiles[<id>]={type,provider,key}`). Rewritten on
        # every pod start — treated as declarative config like openclaw.json.
        - name: seed-auth
          image: busybox:1.36
          envFrom:
            - secretRef:
                name: openclaw-secrets
                optional: true
          command:
            - sh
            - -c
            - |
              dir=/home/node/.openclaw/agents/main/agent
              mkdir -p "$dir"
              cat > "$dir/auth-profiles.json" <<JSON
              {"version":1,"profiles":{"litellm:default":{"type":"api_key","provider":"litellm","key":"${LITELLM_API_KEY}"}}}
              JSON
              cat > "$dir/models.json" <<'JSON'
              {
                "providers": {
                  "litellm": {
                    "baseUrl": "http://litellm.litellm:4000/v1",
                    "api": "openai-completions",
                    "apiKey": "LITELLM_API_KEY",
                    "models": [
                      {
                        "id": "gemma4:e4b",
                        "name": "Gemma 4 E4B",
                        "reasoning": false,
                        "input": ["text"],
                        "cost": {"input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0},
                        "contextWindow": 131072,
                        "maxTokens": 16384,
                        "api": "openai-completions"
                      },
                      {
                        "id": "qwen3-coder-next:latest",
                        "name": "Qwen 3 Coder (Next)",
                        "reasoning": false,
                        "input": ["text"],
                        "cost": {"input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0},
                        "contextWindow": 32768,
                        "maxTokens": 8192,
                        "api": "openai-completions"
                      },
                      {
                        "id": "qwen3:4b-instruct-2507-q8_0",
                        "name": "Qwen 3 4B Instruct (2507, Q8)",
                        "reasoning": false,
                        "input": ["text"],
                        "cost": {"input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0},
                        "contextWindow": 32768,
                        "maxTokens": 8192,
                        "api": "openai-completions"
                      },
                      {
                        "id": "claude-opus-4.7",
                        "name": "Claude Opus 4.7",
                        "reasoning": true,
                        "input": ["text", "image"],
                        "cost": {"input": 5, "output": 25, "cacheRead": 0.5, "cacheWrite": 6.25},
                        "contextWindow": 200000,
                        "maxTokens": 32000,
                        "api": "openai-completions"
                      },
                      {
                        "id": "claude-sonnet-4.6",
                        "name": "Claude Sonnet 4.6",
                        "reasoning": true,
                        "input": ["text", "image"],
                        "cost": {"input": 3, "output": 15, "cacheRead": 0.3, "cacheWrite": 3.75},
                        "contextWindow": 200000,
                        "maxTokens": 32000,
                        "api": "openai-completions"
                      },
                      {
                        "id": "claude-haiku-4.5",
                        "name": "Claude Haiku 4.5",
                        "reasoning": true,
                        "input": ["text", "image"],
                        "cost": {"input": 1, "output": 5, "cacheRead": 0.1, "cacheWrite": 1.25},
                        "contextWindow": 200000,
                        "maxTokens": 16384,
                        "api": "openai-completions"
                      },
                      {
                        "id": "kimi-k2.6",
                        "name": "Kimi K2.6",
                        "reasoning": true,
                        "input": ["text"],
                        "cost": {"input": 0.74, "output": 3.50, "cacheRead": 0, "cacheWrite": 0},
                        "contextWindow": 256000,
                        "maxTokens": 16384,
                        "api": "openai-completions"
                      }
                    ]
                  }
                }
              }
              JSON
          volumeMounts:
            - name: config
              mountPath: /home/node/.openclaw
      containers:
        - name: openclaw
          # Pinned to 2026.4.25-beta.4-slim, NOT 2026.5.x, due to a strict
          # scope-enforcement regression in 2026.5.x for trusted-proxy +
          # WebSocket sessions: Control UI WS connections authenticate but
          # arrive with zero operator scopes, so every RPC fails with
          # `missing scope: operator.read`. trusted-proxy mode has no
          # config knob to grant default scopes (only password/token auth
          # does). Re-attempt the bump when openclaw releases a build that
          # either (a) grants default operator scopes to trusted-proxy WS
          # sessions, or (b) adds a `gateway.auth.trustedProxy.scopes`
          # config field. See openclaw docs/gateway/operator-scopes.md.
          image: ghcr.io/openclaw/openclaw:2026.4.25-beta.4-slim
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 18789
              protocol: TCP
          envFrom:
            - secretRef:
                name: openclaw-secrets
                optional: true
          volumeMounts:
            - name: config
              mountPath: /home/node/.openclaw
            - name: app-config
              mountPath: /home/node/.openclaw/openclaw.json
              subPath: openclaw.json
              readOnly: true
          resources:
            limits:
              nvidia.com/gpu: 1
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: openclaw-config
        - name: app-config
          configMap:
            name: openclaw-app-config
