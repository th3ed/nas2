---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
    spec:
      runtimeClassName: nvidia
      initContainers:
        # Seed openclaw's auth-profiles.json declaratively. Ollama needs no API
        # key but openclaw still requires a profile entry whose `provider`
        # matches the model provider id; absent it, model invocation fails with
        # `No API key found for provider "ollama-local"`. Schema source: the
        # AuthProfileStore reader in /app/dist/profiles-BvYdgqiN.js (v1 store
        # with `profiles[<id>]={type,provider,key}`). Rewritten on every pod
        # start — the file is treated as part of the declarative config, like
        # openclaw.json next to it.
        - name: seed-auth
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              dir=/home/node/.openclaw/agents/main/agent
              mkdir -p "$dir"
              cat > "$dir/auth-profiles.json" <<'JSON'
              {"version":1,"profiles":{"ollama-local:default":{"type":"api_key","provider":"ollama-local","key":"ollama"}}}
              JSON
          volumeMounts:
            - name: config
              mountPath: /home/node/.openclaw
      containers:
        - name: openclaw
          # Pinned to 2026.4.25-beta.4-slim, NOT 2026.5.x, due to a strict
          # scope-enforcement regression in 2026.5.x for trusted-proxy +
          # WebSocket sessions: Control UI WS connections authenticate but
          # arrive with zero operator scopes, so every RPC fails with
          # `missing scope: operator.read`. trusted-proxy mode has no
          # config knob to grant default scopes (only password/token auth
          # does). Re-attempt the bump when openclaw releases a build that
          # either (a) grants default operator scopes to trusted-proxy WS
          # sessions, or (b) adds a `gateway.auth.trustedProxy.scopes`
          # config field. See openclaw docs/gateway/operator-scopes.md.
          image: ghcr.io/openclaw/openclaw:2026.4.25-beta.4-slim
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 18789
              protocol: TCP
          envFrom:
            - secretRef:
                name: openclaw-secrets
                optional: true
          volumeMounts:
            - name: config
              mountPath: /home/node/.openclaw
            - name: app-config
              mountPath: /home/node/.openclaw/openclaw.json
              subPath: openclaw.json
              readOnly: true
          resources:
            limits:
              nvidia.com/gpu: 1
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: openclaw-config
        - name: app-config
          configMap:
            name: openclaw-app-config
