---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: openclaw
  labels:
    app.kubernetes.io/name: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw
    spec:
      runtimeClassName: nvidia
      initContainers:
        # Default gateway bind mode is loopback, which prevents the in-cluster
        # Service (and the Tailscale Ingress proxy) from reaching the gateway.
        # Persist gateway.bind=lan in the config PVC before the gateway starts.
        - name: configure-bind
          image: ghcr.io/openclaw/openclaw:2026.4.25-beta.4-slim
          imagePullPolicy: IfNotPresent
          command: ["openclaw", "config", "set", "gateway.bind", "lan"]
          volumeMounts:
            - name: config
              mountPath: /home/node/.openclaw
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.4.25-beta.4-slim
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 18789
              protocol: TCP
          envFrom:
            - secretRef:
                name: openclaw-secrets
                optional: true
          volumeMounts:
            - name: config
              mountPath: /home/node/.openclaw
          resources:
            limits:
              nvidia.com/gpu: 1
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: openclaw-config
