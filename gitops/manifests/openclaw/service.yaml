---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: openclaw
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: openclaw
  ports:
    - name: http
      port: 80
      targetPort: 18789
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw-tailscale
  namespace: openclaw
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "openclaw"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app.kubernetes.io/name: openclaw
  ports:
    - name: http
      port: 80
      targetPort: 18789
      protocol: TCP
