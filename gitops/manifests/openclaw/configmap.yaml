---
# Declarative OpenClaw runtime config. Mounted into the main container at
# /home/node/.openclaw/openclaw.json via subPath so it sits alongside the
# PVC-backed state directory. ${TELEGRAM_BOT_TOKEN} is interpolated by openclaw
# at startup from the envFrom-injected openclaw-secrets Secret.
apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-app-config
  namespace: openclaw
data:
  openclaw.json: |
    {
      gateway: {
        bind: "lan",
        // Trust the Tailscale Operator's Ingress proxy to authenticate at the
        // perimeter. The proxy injects Tailscale-User-Login (and friends) on
        // forwarded requests; openclaw refuses auth.mode="none" with bind!="loopback",
        // so this is the closest thing to "no auth on tailnet". The k3s pod CIDR
        // covers all in-cluster pods — the only entry path from outside is via
        // the Tailscale Ingress proxy (also a pod), so trusting the CIDR is fine
        // in this single-tenant cluster.
        trustedProxies: ["10.42.0.0/24"],
        auth: {
          mode: "trusted-proxy",
          trustedProxy: {
            userHeader: "Tailscale-User-Login",
          },
        },
        // The Control UI opens a WebSocket back to the gateway and rejects
        // unknown Origin values; allow the tailnet hostname.
        controlUi: {
          allowedOrigins: ["https://openclaw.taile9c9c.ts.net"],
        },
      },
      channels: {
        telegram: {
          enabled: true,
          botToken: "${TELEGRAM_BOT_TOKEN}",
          dmPolicy: "allowlist",
          allowFrom: ["tg:${TELEGRAM_OWNER_ID}"],
        },
      },
      // Pairing mode auto-seeds commands.ownerAllowFrom on first approve;
      // allowlist mode does not, so set it explicitly.
      commands: {
        ownerAllowFrom: ["tg:${TELEGRAM_OWNER_ID}"],
      },
      models: {
        // "replace" hides openclaw's built-in provider catalog (Anthropic,
        // OpenAI, Google, etc.) so the model picker only shows providers
        // declared below — i.e. just ollama-local. "merge" was confusing the
        // UX by surfacing dozens of unconfigured cloud models.
        mode: "replace",
        providers: {
          "litellm": {
            baseUrl: "http://litellm.litellm:4000/v1",
            api: "openai-completions",
            models: [
              {
                id: "gemma4:e4b",
                name: "Gemma 4 E4B",
                // reasoning: true broke tool calls. Ollama's OpenAI-compatible
                // streaming sends ~100 delta.reasoning chunks before the final
                // delta.tool_calls chunk; openclaw's reasoning-mode handler
                // misses the tool_calls. Reverting to false restores tools.
                // Re-enable when openclaw fixes reasoning + tool call streaming.
                reasoning: false,
                input: ["text"],
                cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 },
                // Full native window per `ollama show`. With OLLAMA_CONTEXT_LENGTH
                // raised to match, OpenClaw stops triggering compaction every
                // 2-3 turns.
                contextWindow: 131072,
                maxTokens: 16384,
              },
              {
                id: "qwen3-coder-next:latest",
                name: "Qwen 3 Coder (Next)",
                reasoning: false,
                input: ["text"],
                cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 },
                contextWindow: 32768,
                maxTokens: 8192,
              },
              {
                id: "qwen3:4b-instruct-2507-q8_0",
                name: "Qwen 3 4B Instruct (2507, Q8)",
                reasoning: false,
                input: ["text"],
                cost: { input: 0, output: 0, cacheRead: 0, cacheWrite: 0 },
                contextWindow: 32768,
                maxTokens: 8192,
              },
              // OpenRouter-backed cloud models exposed by LiteLLM. LiteLLM
              // strips PII before the request leaves the tailnet and restores
              // it in the response (presidio-pii guardrail with
              // output_parse_pii=True).
              //
              // reasoning: true is safe here. The bug documented on the local
              // entries is Ollama-specific: Ollama's OpenAI-compat layer
              // streams ~100 delta.reasoning chunks before the terminal
              // delta.tool_calls, which trips openclaw's reasoning handler.
              // Anthropic and Moonshot emit thinking and tool_use as
              // separate content blocks so tool calls aren't lost.
              //
              // cost in USD per 1M tokens, from OpenRouter pricing pages.
              // Anthropic cacheRead/cacheWrite are Anthropic's standard
              // 10% / 125% multipliers on input — OpenRouter doesn't surface
              // them on the model page but passes through Anthropic's rates.
              {
                id: "claude-opus-4.7",
                name: "Claude Opus 4.7",
                reasoning: true,
                input: ["text", "image"],
                cost: { input: 5, output: 25, cacheRead: 0.5, cacheWrite: 6.25 },
                contextWindow: 200000,
                maxTokens: 32000,
              },
              {
                id: "claude-sonnet-4.6",
                name: "Claude Sonnet 4.6",
                reasoning: true,
                input: ["text", "image"],
                cost: { input: 3, output: 15, cacheRead: 0.3, cacheWrite: 3.75 },
                contextWindow: 200000,
                maxTokens: 32000,
              },
              {
                id: "claude-haiku-4.5",
                name: "Claude Haiku 4.5",
                reasoning: true,
                input: ["text", "image"],
                cost: { input: 1, output: 5, cacheRead: 0.1, cacheWrite: 1.25 },
                contextWindow: 200000,
                maxTokens: 16384,
              },
              {
                id: "kimi-k2.6",
                name: "Kimi K2.6",
                reasoning: true,
                input: ["text"],
                // OpenRouter publishes only input/output for Kimi.
                cost: { input: 0.74, output: 3.50, cacheRead: 0, cacheWrite: 0 },
                contextWindow: 256000,
                maxTokens: 16384,
              },
            ],
          },
        },
      },
      agents: {
        defaults: {
          // Local by default. Cloud usage is opt-in per session:
          //   - model.primary = local Gemma. Conversations + heartbeats
          //     (which have no per-role override) run on this for free.
          //   - compaction.model is intentionally unset so compaction
          //     follows the session-active model. A session that stayed
          //     local compacts locally; a session where the user picked
          //     a cloud model in the UI compacts on that cloud model
          //     (consistent quality, and the user already chose to pay).
          //     The /app/dist bundle documents compaction.model as an
          //     "override used only for compaction summarization" — i.e.
          //     omit it and the session's model is used.
          //   - imageModel / pdfModel point at cloud. These only fire
          //     when the user uploads media (explicit action, not
          //     passive); no local model in our catalog supports vision,
          //     and openclaw errors with "no image model configured" if
          //     they're unset. Haiku is the cheapest vision-capable
          //     Anthropic model; Sonnet is the PDF default for quality.
          model: {
            primary: "litellm/gemma4:e4b",
          },
          imageModel: {
            primary: "litellm/claude-haiku-4.5",
          },
          pdfModel: {
            primary: "litellm/claude-sonnet-4.6",
          },
          // Allowlist: only these keys appear in the UI model picker.
          // models.mode="replace" restricts CLI but has a known bug where
          // the Control UI dropdown still shows the full built-in catalog.
          // agents.defaults.models is the workaround that actually gates the UI.
          models: {
            "litellm/gemma4:e4b": {},
            "litellm/qwen3-coder-next:latest": {},
            "litellm/qwen3:4b-instruct-2507-q8_0": {},
            "litellm/claude-opus-4.7": {},
            "litellm/claude-sonnet-4.6": {},
            "litellm/claude-haiku-4.5": {},
            "litellm/kimi-k2.6": {},
          },
        },
      },
    }
