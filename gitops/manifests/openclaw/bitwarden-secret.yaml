---
# Replace bitwardenOrgId and the bwSecretId values below with values from
# Bitwarden Secrets Manager. The auth-token Secret (bw-auth-token) is created
# out-of-band by the argocd_bootstrap Ansible role from vault_bitwarden_sm_token.
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: openclaw-secrets
  namespace: openclaw
spec:
  organizationId: c046a20a-413d-4b54-8a56-b1790122c5ef
  secretName: openclaw-secrets
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: 4908a901-a160-476a-a964-b43f00d45aa0
      secretKeyName: TELEGRAM_BOT_TOKEN
