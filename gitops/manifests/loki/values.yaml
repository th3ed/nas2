---
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    retention_period: 168h
  pattern_ingester:
    enabled: true

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 50Gi

read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

chunksCache:
  enabled: false
resultsCache:
  enabled: false

minio:
  enabled: false

gateway:
  enabled: true
  replicas: 1

test:
  enabled: false
lokiCanary:
  enabled: false
