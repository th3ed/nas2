---
# GitHub App credentials in agents namespace. The pr-pusher Job (and
# later pr-reviewer-poster) consumes this via envFrom to mint short-
# lived (1h) installation tokens for `git push` and `gh pr create`.
#
# Same bwSecretIds as github-app/github-app-secrets — they reference
# the same Bitwarden Secrets Manager entries. Only one GitHub App
# exists for nas2; cross-namespace token-scope separation comes from
# the Jobs requesting different permissions when minting, not from
# different App keys.
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: github-app-secrets
  namespace: agents
spec:
  organizationId: c046a20a-413d-4b54-8a56-b1790122c5ef
  secretName: github-app-secrets
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: 90618a9c-470d-4666-b9ef-b44d017fc7ee
      secretKeyName: GH_APP_ID
    - bwSecretId: 8cd80276-d2f6-4c5f-b980-b44d0180e09a
      secretKeyName: GH_APP_INSTALLATION_ID
    - bwSecretId: 6ab9b7a8-165b-455d-8de1-b44d01811863
      secretKeyName: GH_APP_PRIVATE_KEY
