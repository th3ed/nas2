# Default values for the news chart.
# Override per-deployment by mounting a values file at $values/gitops/manifests/news/values.yaml.

namespace:
  create: true
  name: news

# Pin every workload to a single node. This is a workaround for the cross-node
# DNS gotcha (the private andrews.casa zone doesn't resolve from desktop pods);
# see CLAUDE.md. On a deployment without that constraint, set nodeSelector: {}.
nodeSelector:
  kubernetes.io/hostname: nas2

# Tailnet MagicDNS domain; matches group_vars/all/main.yml. Used to derive the
# short hostname for tailscale Ingress TLS blocks.
tailnetDomain: taile9c9c.ts.net

# Python base for all script-driven containers (mem0 library-mode pattern;
# the chart does not ship custom images).
runtime:
  pythonImage: python:3.12-slim
  # Pip pin lists for each library-mode pod. Each entry is rendered as a
  # single-quoted shell arg so version constraints like `>=1.2,<2` don't get
  # mangled into stdin/stderr redirections by the shell. Must match the
  # imports in the script ConfigMaps.
  pipPins:
    mcp:
      - "mcp>=1.2,<2"
      - "psycopg2-binary>=2.9,<3"
      - "pgvector>=0.3,<1"
      - "httpx>=0.27,<1"
    ingest:
      - "httpx>=0.27,<1"
      - "trafilatura>=1.12,<3"
      - "psycopg2-binary>=2.9,<3"
      - "pgvector>=0.3,<1"
      - "lxml-html-clean>=0.4"
    ui:
      - "fastapi>=0.115,<1"
      - "jinja2>=3.1,<4"
      - "httpx>=0.27,<1"
      - "kubernetes>=31,<32"
      - "uvicorn>=0.32,<1"

postgres:
  image: ankane/pgvector:v0.5.1
  storage: 10Gi
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits: {memory: 1Gi}

litellm:
  baseUrl: http://litellm.litellm:4000/v1
  embedModel: text-embedding-3-small
  embedDim: 768
  summarizeModel: qwen3:4b-instruct-2507-q8_0

ingest:
  enabled: true
  schedule: "*/30 * * * *"
  backfillDays: 14
  fetchBatch: 200
  chunkSize: 2000
  chunkOverlap: 200
  embedConcurrency: 64
  summarizeConcurrency: 8

dedup:
  cosineThreshold: 0.95

mcp:
  enabled: true
  replicas: 1
  hostname: news-mcp.taile9c9c.ts.net
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits: {memory: 512Mi}

# Web UI is gated until PR 6 implements it. Keep disabled in PR 1.
ui:
  enabled: false
  hostname: news.taile9c9c.ts.net
  forceResyncEnabled: true
  resources:
    requests: {cpu: 50m, memory: 128Mi}
    limits: {memory: 512Mi}

# All runtime secrets go through Bitwarden Secrets Manager (sm-operator).
# Bitwarden secret IDs match the previous news-rag deployment.
secrets:
  bitwardenOrganizationId: c046a20a-413d-4b54-8a56-b1790122c5ef
  secretName: news-secrets
  authToken:
    secretName: bw-auth-token
    secretKey: token
  mappings:
    - envName: POSTGRES_PASSWORD
      bwSecretId: 2ce4a3c8-3909-401f-bf84-b45a011ab7c1
    - envName: LITELLM_API_KEY
      bwSecretId: 53904946-84fc-46dd-858b-b446001ff47a
    - envName: FRESHRSS_URL
      bwSecretId: 070086ba-de47-4dfc-82c9-b4520014d403
    - envName: FRESHRSS_USER
      bwSecretId: c386878f-929c-47e5-ba39-b4520014e268
    - envName: FRESHRSS_API_PASSWORD
      bwSecretId: bb819cab-ce11-440a-a0cf-b4520014f4b9

# One-shot data migration from a pre-rename news-rag namespace. Disabled
# after PR 1 verified the cutover (the new ingest cron backfilled from
# FreshRSS faster than the migration script could run, so the idempotency
# guard skipped it cleanly). Set enabled=true only if redeploying to a
# cluster that still has a pre-rename news-rag postgres to drain.
migration:
  enabled: false
  sourceNamespace: news-rag
  sourcePostgresService: news-rag-postgres

# One-shot DELETE of the old AgentRegistry server entry. Disabled after PR 1
# successfully removed it; re-enable only for a fresh deploy whose registry
# still has the pre-rename `news-rag.news-rag-mcp/articles` entry.
registryCleanup:
  enabled: false
  registryUrl: http://agentregistry.agentregistry:12121
  oldServerName: "news-rag.news-rag-mcp/articles"
  oldServerVersion: "1.0.0"

# Opt-in Prometheus ServiceMonitor (kube-prometheus-stack runs at sync wave 5).
serviceMonitor:
  enabled: false
