<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}news{% endblock %}</title>
  <style>
    :root {
      --bg: #0e1116; --fg: #d8dee9; --muted: #7a8896; --accent: #88c0d0;
      --border: #2c333d; --ok: #a3be8c; --err: #bf616a; --warn: #ebcb8b;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
           background: var(--bg); color: var(--fg); }
    header { background: #161b22; padding: 12px 24px; border-bottom: 1px solid var(--border); }
    header a { color: var(--accent); text-decoration: none; margin-right: 18px; font-weight: 600; }
    header a.brand { color: var(--fg); font-size: 1.1rem; margin-right: 32px; }
    main { padding: 24px; max-width: 1280px; margin: 0 auto; }
    h1 { font-size: 1.4rem; margin: 8px 0 16px; }
    h2 { font-size: 1.1rem; margin: 18px 0 8px; color: var(--accent); }
    table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
    th, td { padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top; }
    th { color: var(--muted); font-weight: 500; }
    .muted { color: var(--muted); font-size: 0.88rem; }
    .pill { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 0.78rem; }
    .ok      { background: rgba(163,190,140,.18); color: var(--ok); }
    .failed  { background: rgba(191,97,106,.18); color: var(--err); }
    .running { background: rgba(235,203,139,.18); color: var(--warn); }
    a.article { color: var(--fg); text-decoration: none; }
    a.article:hover { color: var(--accent); }
    form.inline { display: inline; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap: 12px; margin-bottom: 18px; }
    .stat { background: #161b22; border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; }
    .stat .label { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: .04em; }
    .stat .value { font-size: 1.4rem; font-weight: 600; margin-top: 4px; }
    button, input[type=text] {
      background: #161b22; color: var(--fg); border: 1px solid var(--border);
      border-radius: 4px; padding: 5px 10px; font: inherit;
    }
    button { cursor: pointer; }
    button:hover { border-color: var(--accent); color: var(--accent); }
    .filterbar { margin-bottom: 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .pagination { margin-top: 16px; display: flex; gap: 8px; align-items: center; }
    pre.body { white-space: pre-wrap; background: #161b22; padding: 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.92rem; line-height: 1.4; }
  </style>
</head>
<body>
  <header>
    <a href="/" class="brand">news</a>
    <a href="/">Dashboard</a>
    <a href="/articles">Articles</a>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
