apiVersion: v1
kind: ConfigMap
metadata:
  name: news-ingest-script
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "news.componentLabels" (dict "component" "ingest" "ctx" .) | nindent 4 }}
data:
  ingest.py: |
    """FreshRSS -> trafilatura -> chunk -> embed -> summarize -> pgvector.
    Idempotent on article id. Writes into chunks + chunk_articles (the new
    schema); no near-duplicate collapse yet — that lands in PR 3."""
    import hashlib
    import logging
    import os
    import re
    import sys
    import time
    from datetime import datetime, timedelta, timezone
    from urllib.parse import quote

    import httpx
    import psycopg2
    import trafilatura
    from pgvector.psycopg2 import register_vector

    logging.basicConfig(
        level=logging.INFO,
        format="%(asctime)s %(levelname)s %(message)s",
    )
    log = logging.getLogger("ingest")

    PG = dict(
        host=os.environ["PG_HOST"],
        port=int(os.environ.get("PG_PORT", "5432")),
        dbname=os.environ["PG_DB"],
        user=os.environ["PG_USER"],
        password=os.environ["POSTGRES_PASSWORD"],
    )
    LITELLM_BASE = os.environ["LITELLM_BASE_URL"].rstrip("/")
    LITELLM_KEY = os.environ["LITELLM_API_KEY"]
    MODEL_EMBEDDING = os.environ.get("MODEL_EMBEDDING", "text-embedding-3-small")
    MODEL_SUMMARY = os.environ.get("MODEL_SUMMARY", "qwen3:4b-instruct-2507-q8_0")
    FRESHRSS_URL = os.environ["FRESHRSS_URL"].rstrip("/")
    FRESHRSS_USER = os.environ["FRESHRSS_USER"]
    FRESHRSS_PW = os.environ["FRESHRSS_API_PASSWORD"]
    BACKFILL_DAYS = int(os.environ.get("BACKFILL_DAYS", "14"))
    FETCH_BATCH = int(os.environ.get("FETCH_BATCH", "200"))
    CHUNK_SIZE = int(os.environ.get("CHUNK_SIZE", "2000"))
    CHUNK_OVERLAP = int(os.environ.get("CHUNK_OVERLAP", "200"))
    USER_AGENT = "nas2-news/1.0 (+https://github.com/th3ed/nas2)"

    _FR_RETRY_EXCS = (httpx.ConnectError, httpx.TimeoutException, httpx.NetworkError)

    def _fr_get(url, *, params=None, headers=None, timeout=60) -> httpx.Response:
        delay = 2
        for attempt in range(3):
            try:
                return httpx.get(url, params=params, headers=headers, timeout=timeout)
            except _FR_RETRY_EXCS as exc:
                if attempt == 2:
                    raise
                log.warning("FreshRSS GET failed (attempt %d/3): %s — retry in %ds", attempt + 1, exc, delay)
                time.sleep(delay)
                delay *= 2

    def fr_login() -> str:
        delay = 2
        for attempt in range(3):
            try:
                r = httpx.post(
                    f"{FRESHRSS_URL}/api/greader.php/accounts/ClientLogin",
                    data={"Email": FRESHRSS_USER, "Passwd": FRESHRSS_PW},
                    timeout=30,
                )
                r.raise_for_status()
                for line in r.text.splitlines():
                    if line.startswith("Auth="):
                        return line[5:]
                raise RuntimeError("ClientLogin response missing Auth= line")
            except _FR_RETRY_EXCS as exc:
                if attempt == 2:
                    raise
                log.warning("FreshRSS login failed (attempt %d/3): %s — retry in %ds", attempt + 1, exc, delay)
                time.sleep(delay)
                delay *= 2

    def fr_articles_since(auth: str, since_ts: int):
        params = {"output": "json", "n": str(FETCH_BATCH), "ot": str(since_ts), "r": "o"}
        stream = quote("user/-/state/com.google/reading-list", safe="")
        url = f"{FRESHRSS_URL}/api/greader.php/reader/api/0/stream/contents/{stream}"
        cont = None
        while True:
            p = dict(params)
            if cont:
                p["c"] = cont
            r = _fr_get(
                url, params=p,
                headers={"Authorization": f"GoogleLogin auth={auth}"},
            )
            r.raise_for_status()
            data = r.json()
            for item in data.get("items", []):
                yield item
            cont = data.get("continuation")
            if not cont:
                return

    def fetch_body(url: str) -> tuple[str, str]:
        try:
            r = httpx.get(
                url, timeout=15, follow_redirects=True,
                headers={"User-Agent": USER_AGENT},
            )
            if r.status_code >= 400:
                return "", "fetch_failed"
            body = trafilatura.extract(r.text) or ""
            if len(body) < 200:
                return body, "too_short"
            return body, "ok"
        except Exception as exc:
            log.warning("fetch failed %s: %s", url, exc)
            return "", "fetch_failed"

    def html_to_text(html: str) -> str:
        return " ".join(re.sub(r"<[^>]+>", " ", html or "").split())

    def chunk_text(text: str, target: int = CHUNK_SIZE, overlap: int = CHUNK_OVERLAP) -> list[str]:
        if len(text) <= target:
            return [text] if text.strip() else []
        paragraphs = [p for p in text.split("\n\n") if p.strip()]
        chunks: list[str] = []
        current = ""
        for p in paragraphs:
            if len(current) + len(p) + 2 > target and current:
                chunks.append(current.strip())
                current = (current[-overlap:] + "\n\n" + p) if overlap else p
            else:
                current = current + ("\n\n" if current else "") + p
        if current.strip():
            chunks.append(current.strip())
        out: list[str] = []
        for c in chunks:
            if len(c) <= target * 1.5:
                out.append(c)
                continue
            for i in range(0, len(c), max(target - overlap, 1)):
                seg = c[i : i + target]
                if seg.strip():
                    out.append(seg)
        return out

    def embed(texts: list[str]) -> list[list[float]]:
        r = httpx.post(
            f"{LITELLM_BASE}/embeddings",
            headers={
                "Authorization": f"Bearer {LITELLM_KEY}",
                "Content-Type": "application/json",
            },
            json={"model": MODEL_EMBEDDING, "input": texts},
            timeout=180,
        )
        r.raise_for_status()
        return [d["embedding"] for d in r.json()["data"]]

    SUMMARY_PROMPT = (
        "Summarize the following article in 2-3 sentences. "
        "Focus on the key facts. No preamble, no meta-commentary about the article itself.\n\n"
        "Title: {title}\n\nArticle:\n{body}\n\nSummary:"
    )

    def summarize(title: str, body: str) -> str:
        prompt = SUMMARY_PROMPT.format(title=title, body=body[:8000])
        r = httpx.post(
            f"{LITELLM_BASE}/chat/completions",
            headers={
                "Authorization": f"Bearer {LITELLM_KEY}",
                "Content-Type": "application/json",
            },
            json={
                "model": MODEL_SUMMARY,
                "messages": [{"role": "user", "content": prompt}],
                "max_tokens": 2000,
            },
            timeout=600,
        )
        r.raise_for_status()
        return r.json()["choices"][0]["message"]["content"].strip()

    def main() -> int:
        conn = psycopg2.connect(**PG)
        register_vector(conn)

        with conn.cursor() as cur:
            cur.execute(
                "SELECT last_article_published_at, backfill_completed "
                "FROM ingest_state WHERE id = 1"
            )
            row = cur.fetchone() or (None, False)
        last_pub, backfilled = row

        if not last_pub or not backfilled:
            since = datetime.now(timezone.utc) - timedelta(days=BACKFILL_DAYS)
            log.info("backfill mode, since=%s", since.isoformat())
        else:
            since = last_pub - timedelta(hours=1)
            log.info("incremental mode, since=%s", since.isoformat())
        since_ts = int(since.timestamp())

        auth = fr_login()

        inserted = 0
        skipped = 0
        failed = 0
        max_pub_ts = int(last_pub.timestamp()) if last_pub else 0

        for item in fr_articles_since(auth, since_ts):
            item_id = item.get("id") or ""
            if not item_id:
                continue
            pub_ts = int(item.get("published") or 0)
            if pub_ts > max_pub_ts:
                max_pub_ts = pub_ts
            title = item.get("title") or ""
            author = item.get("author") or ""
            origin = item.get("origin") or {}
            feed_title = origin.get("title") or ""
            feed_id = origin.get("streamId") or ""
            cats_raw = item.get("categories") or []
            labels = [c.split("/label/")[-1] for c in cats_raw if "/label/" in c]
            category = labels[0] if labels else ""
            url = next(
                (a.get("href") for a in (item.get("alternate") or []) if a.get("href")),
                "",
            )
            is_read = "user/-/state/com.google/read" in cats_raw
            is_starred = "user/-/state/com.google/starred" in cats_raw
            fr_html = (item.get("summary") or {}).get("content") or ""
            published_at = (
                datetime.fromtimestamp(pub_ts, tz=timezone.utc)
                if pub_ts else datetime.now(timezone.utc)
            )

            if not url:
                continue

            with conn.cursor() as cur:
                cur.execute(
                    """INSERT INTO articles (
                           id, feed_id, feed_title, category, title, author, url,
                           published_at, body_source, extraction_status, content_hash,
                           read, starred, state_synced_at)
                       VALUES (%s,%s,%s,%s,%s,%s,%s, %s, %s,%s,%s, %s,%s, now())
                       ON CONFLICT (id) DO NOTHING
                       RETURNING id""",
                    (item_id, feed_id, feed_title, category, title, author, url,
                     published_at, "pending", "pending", "", is_read, is_starred),
                )
                if not cur.fetchone():
                    skipped += 1
                    continue
            conn.commit()

            body, status = fetch_body(url)
            source = "trafilatura"
            if status != "ok" and fr_html:
                body = html_to_text(fr_html)
                source = "freshrss_fallback"
                status = "ok" if len(body) >= 200 else "too_short"

            if status != "ok":
                with conn.cursor() as cur:
                    cur.execute(
                        "UPDATE articles SET body_source=%s, extraction_status=%s, "
                        "body_text=%s WHERE id=%s",
                        (source, status, body or "", item_id),
                    )
                conn.commit()
                failed += 1
                log.info("extraction %s for %s", status, url[:80])
                continue

            try:
                chunks = chunk_text(body)
                if not chunks:
                    raise RuntimeError("zero chunks")
                embeddings = embed(chunks)
                summary = summarize(title, body)
                content_hash = hashlib.sha256(body.encode("utf-8")).hexdigest()
                with conn.cursor() as cur:
                    # New schema: insert each chunk into `chunks`, capture its
                    # generated id, link it to the article via `chunk_articles`.
                    # No dedup in PR 1 — citation_ct defaults to 1. Stage-batching
                    # + near-duplicate collapse lands in PR 3.
                    for i, (chunk, vec) in enumerate(zip(chunks, embeddings)):
                        cur.execute(
                            "INSERT INTO chunks (text, embedding) VALUES (%s, %s) RETURNING id",
                            (chunk, vec),
                        )
                        chunk_id = cur.fetchone()[0]
                        cur.execute(
                            "INSERT INTO chunk_articles (chunk_id, article_id, position) "
                            "VALUES (%s, %s, %s)",
                            (chunk_id, item_id, i),
                        )
                    cur.execute(
                        """UPDATE articles
                           SET body_text=%s, body_source=%s, extraction_status='ok',
                               summary=%s, content_hash=%s
                           WHERE id=%s""",
                        (body, source, summary, content_hash, item_id),
                    )
                conn.commit()
                inserted += 1
                log.info("ingested %d chunks: %s", len(chunks), title[:80])
            except Exception as exc:
                conn.rollback()
                log.error("post-fetch failed for %s: %s", item_id[:60], exc)
                failed += 1

        with conn.cursor() as cur:
            if max_pub_ts > 0:
                new_last = datetime.fromtimestamp(max_pub_ts, tz=timezone.utc)
                cur.execute(
                    "UPDATE ingest_state "
                    "SET last_article_published_at=%s, last_successful_run_at=now(), "
                    "    backfill_completed=true "
                    "WHERE id=1",
                    (new_last,),
                )
            else:
                cur.execute(
                    "UPDATE ingest_state SET last_successful_run_at=now() WHERE id=1"
                )
        conn.commit()
        conn.close()

        log.info("done inserted=%d skipped=%d failed=%d", inserted, skipped, failed)
        return 0

    if __name__ == "__main__":
        sys.exit(main())
