{{- if .Values.ui.enabled }}
# Minimal RBAC: news-ui only needs to read the news-ingest CronJob spec
# and create one-shot Jobs in its own namespace when the "Run ingest now"
# button fires. Gated by `ui.forceResyncEnabled=false` at the app level if
# you'd rather disable that button entirely.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: news-ui
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "news.componentLabels" (dict "component" "ui" "ctx" .) | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: news-ui
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "news.componentLabels" (dict "component" "ui" "ctx" .) | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: news-ui
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "news.componentLabels" (dict "component" "ui" "ctx" .) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: news-ui
subjects:
  - kind: ServiceAccount
    name: news-ui
    namespace: {{ .Values.namespace.name }}
{{- end }}
