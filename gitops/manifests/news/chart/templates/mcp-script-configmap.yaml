apiVersion: v1
kind: ConfigMap
metadata:
  name: news-mcp-script
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "news.componentLabels" (dict "component" "mcp" "ctx" .) | nindent 4 }}
data:
  news_mcp.py: |
    """news MCP server: RAG over FreshRSS articles in pgvector."""
    from __future__ import annotations

    import logging
    import os
    import re
    from contextlib import contextmanager
    from datetime import datetime, timedelta, timezone
    from typing import Any

    import httpx
    import psycopg2
    import psycopg2.extras
    from mcp.server.fastmcp import FastMCP
    from pgvector.psycopg2 import register_vector

    logging.basicConfig(
        level=logging.INFO,
        format="%(asctime)s %(levelname)s %(name)s %(message)s",
    )
    log = logging.getLogger("news-mcp")

    PG = dict(
        host=os.environ["PG_HOST"],
        port=int(os.environ.get("PG_PORT", "5432")),
        dbname=os.environ.get("PG_DB", "postgres"),
        user=os.environ.get("PG_USER", "postgres"),
        password=os.environ["POSTGRES_PASSWORD"],
    )
    LITELLM_BASE = os.environ["LITELLM_BASE_URL"].rstrip("/")
    LITELLM_KEY = os.environ["LITELLM_API_KEY"]
    MODEL_EMBEDDING = os.environ.get("MODEL_EMBEDDING", "text-embedding-3-small")
    FRESHRSS_URL = os.environ["FRESHRSS_URL"].rstrip("/")
    FRESHRSS_USER = os.environ["FRESHRSS_USER"]
    FRESHRSS_PW = os.environ["FRESHRSS_API_PASSWORD"]

    _fr_auth: str | None = None
    _fr_write_token: str | None = None

    @contextmanager
    def pg_conn():
        conn = psycopg2.connect(**PG)
        register_vector(conn)
        try:
            yield conn
        finally:
            conn.close()

    def embed(text: str) -> list[float]:
        r = httpx.post(
            f"{LITELLM_BASE}/embeddings",
            headers={
                "Authorization": f"Bearer {LITELLM_KEY}",
                "Content-Type": "application/json",
            },
            json={"model": MODEL_EMBEDDING, "input": [text]},
            timeout=60,
        )
        r.raise_for_status()
        return r.json()["data"][0]["embedding"]

    def _fr_login() -> str:
        r = httpx.post(
            f"{FRESHRSS_URL}/api/greader.php/accounts/ClientLogin",
            data={"Email": FRESHRSS_USER, "Passwd": FRESHRSS_PW},
            timeout=30,
        )
        r.raise_for_status()
        for line in r.text.splitlines():
            if line.startswith("Auth="):
                return line[5:]
        raise RuntimeError("ClientLogin response missing Auth=")

    def _fr_get_write_token(auth: str) -> str:
        r = httpx.get(
            f"{FRESHRSS_URL}/api/greader.php/reader/api/0/token",
            headers={"Authorization": f"GoogleLogin auth={auth}"},
            timeout=30,
        )
        r.raise_for_status()
        return r.text.strip()

    def _fr_edit_tag(article_id: str, add: str | None = None, remove: str | None = None) -> None:
        global _fr_auth, _fr_write_token
        for attempt in (1, 2):
            if not _fr_auth:
                _fr_auth = _fr_login()
                _fr_write_token = _fr_get_write_token(_fr_auth)
            data = {"i": article_id, "T": _fr_write_token}
            if add:
                data["a"] = add
            if remove:
                data["r"] = remove
            r = httpx.post(
                f"{FRESHRSS_URL}/api/greader.php/reader/api/0/edit-tag",
                data=data,
                headers={"Authorization": f"GoogleLogin auth={_fr_auth}"},
                timeout=30,
            )
            if r.status_code == 401 and attempt == 1:
                _fr_auth = None
                _fr_write_token = None
                continue
            r.raise_for_status()
            return

    _RELATIVE_RE = re.compile(r"^\s*(\d+)\s*([hdwmHDWM])\s*$")

    # If the query window ends more than HISTORICAL_THRESHOLD ago, mark the
    # response is_historical=True so callers know not to frame results as
    # "recent news". 6 hours is enough lead to not flag last-night queries
    # but short enough that "what happened last week" still gets flagged.
    HISTORICAL_THRESHOLD = timedelta(hours=6)

    def parse_when(value: Any, *, now: datetime | None = None) -> datetime | None:
        """Accept None, ISO timestamp, or relative ('24h','7d','2w'). Relative
        values are interpreted backward from `now` (or wall-clock now)."""
        if value is None or value == "":
            return None
        if isinstance(value, datetime):
            return value
        s = str(value).strip()
        m = _RELATIVE_RE.match(s)
        if m:
            base = now or datetime.now(timezone.utc)
            n = int(m.group(1))
            unit = m.group(2).lower()
            delta = {
                "h": timedelta(hours=n),
                "d": timedelta(days=n),
                "w": timedelta(weeks=n),
                "m": timedelta(days=30 * n),
            }[unit]
            return base - delta
        try:
            return datetime.fromisoformat(s.replace("Z", "+00:00"))
        except ValueError as exc:
            raise ValueError(f"could not parse time '{value}': {exc}") from exc

    # Back-compat alias for callers still using the old name.
    parse_since = parse_when

    def _row_to_dict(cur, row) -> dict[str, Any]:
        result = {}
        for col, val in zip([d.name for d in cur.description], row):
            if isinstance(val, datetime):
                result[col] = val.isoformat()
            else:
                result[col] = val
        return result

    def _iso(dt: datetime | None) -> str | None:
        return dt.isoformat() if dt else None

    def _build_window(
        since_dt: datetime | None,
        until_dt: datetime | None,
        as_of_dt: datetime | None,
    ) -> dict[str, Any]:
        """Return a {query_window, as_of, is_historical} block uniform across
        search_articles and get_briefing. is_historical fires when either the
        query window ends >HISTORICAL_THRESHOLD ago OR the caller supplied an
        as_of cut-off that is >HISTORICAL_THRESHOLD in the past."""
        now = datetime.now(timezone.utc)
        as_of = as_of_dt or now
        end = until_dt or as_of
        is_historical = (now - end) > HISTORICAL_THRESHOLD
        return {
            "query_window": {"start": _iso(since_dt), "end": _iso(until_dt)},
            "as_of": _iso(as_of),
            "is_historical": is_historical,
        }

    mcp = FastMCP(
        name="articles",
        instructions=(
            "RAG over RSS articles ingested from FreshRSS into pgvector. "
            "Use get_briefing for 'what's new' / morning briefing (no vector search, fast). "
            "Use search_articles for topic-based deep questions. "
            "Use get_article for the full body once a search has surfaced a hit. "
            "mark_read and star mutate FreshRSS state — only call after explicit user confirmation. "
            "search_articles and get_briefing return a {query_window, as_of, is_historical, results} envelope; "
            "when is_historical=true the articles are from the queried window, NOT the present — "
            "refer to them by their published_at dates and avoid relative phrases like "
            "'today', 'recently', or 'this week'."
        ),
        host=os.environ.get("FASTMCP_HOST", "0.0.0.0"),
        port=int(os.environ.get("FASTMCP_PORT", "8080")),
    )

    @mcp.tool()
    def search_articles(
        query: str,
        top_k: int = 10,
        since: str | None = None,
        until: str | None = None,
        as_of: str | None = None,
        source: str | None = None,
        category: str | None = None,
        only_unread: bool = False,
    ) -> dict[str, Any]:
        """Semantic search across ingested articles via pgvector.

        Filters apply BEFORE the vector search. Returns the best chunk per
        article, ranked by cosine similarity (1.0 = identical).

        Time params:
          since / until: ISO timestamps OR relative ('24h','7d','2w'),
            inclusive bounds on article published_at.
          as_of:         optional reference point for is_historical detection;
                         defaults to now(). Use when the user asked "as of
                         March 31, what did the news say about X" — the
                         response is flagged is_historical=true even if
                         since/until aren't set.

        Return shape:
          {
            query_window: {start, end},
            as_of: <iso>,
            is_historical: <bool>,   # true when window ended >6h ago
            results: [ { id, title, url, summary, published_at, feed_title,
                         category, read, starred, chunk_text, similarity } ]
          }

        When is_historical is true, the LLM MUST NOT frame results as "recent"
        or "today" — reference articles by their published_at dates.
        """
        qv = embed(query)
        since_dt = parse_when(since)
        until_dt = parse_when(until)
        as_of_dt = parse_when(as_of)
        source_like = f"%{source}%" if source else None
        sql = """
            WITH ranked AS (
              SELECT DISTINCT ON (ca.article_id)
                a.id, a.title, a.url, a.summary, a.published_at,
                a.feed_title, a.category, a.read, a.starred,
                c.text AS chunk_text,
                c.embedding <=> %s::vector AS distance
              FROM chunks c
              JOIN chunk_articles ca ON ca.chunk_id = c.id
              JOIN articles a ON a.id = ca.article_id
              WHERE a.extraction_status = 'ok'
                AND (%s::timestamptz IS NULL OR a.published_at >= %s::timestamptz)
                AND (%s::timestamptz IS NULL OR a.published_at <= %s::timestamptz)
                AND (%s::text IS NULL OR a.feed_title ILIKE %s::text)
                AND (%s::text IS NULL OR a.category = %s::text)
                AND (%s::bool = false OR a.read = false)
              ORDER BY ca.article_id, c.embedding <=> %s::vector
            )
            SELECT id, title, url, summary, published_at, feed_title, category,
                   read, starred, chunk_text, (1.0 - distance)::float AS similarity
            FROM ranked
            ORDER BY distance
            LIMIT %s
        """
        params = (
            qv,
            since_dt, since_dt,
            until_dt, until_dt,
            source, source_like,
            category, category,
            only_unread,
            qv,
            top_k,
        )
        with pg_conn() as conn:
            with conn.cursor() as cur:
                cur.execute(sql, params)
                rows = cur.fetchall()
                results = [_row_to_dict(cur, r) for r in rows]
        envelope = _build_window(since_dt, until_dt, as_of_dt)
        envelope["results"] = results
        return envelope

    @mcp.tool()
    def get_briefing(
        since: str = "24h",
        until: str | None = None,
        as_of: str | None = None,
        source: str | None = None,
        category: str | None = None,
        only_unread: bool = False,
        limit: int = 20,
    ) -> dict[str, Any]:
        """SQL-only newest-first feed of article summaries. No vector search.

        Time params:
          since: ISO timestamp OR relative ('24h','7d','2w'). Default '24h'.
          until: optional upper bound — set both since AND until for a
                 historical window like "what happened March 1–31, 2024".
          as_of: optional reference point for is_historical detection.

        Return shape:
          {
            query_window: {start, end},
            as_of: <iso>,
            is_historical: <bool>,   # true when window ended >6h ago
            results: [ { id, title, url, summary, published_at, feed_title,
                         category, read, starred } ]
          }

        When is_historical is true, the LLM MUST NOT frame results as "recent"
        or "today" — reference articles by their published_at dates.
        """
        since_dt = parse_when(since)
        until_dt = parse_when(until)
        as_of_dt = parse_when(as_of)
        source_like = f"%{source}%" if source else None
        sql = """
            SELECT id, title, url, summary, published_at, feed_title, category, read, starred
            FROM articles
            WHERE extraction_status = 'ok'
              AND summary IS NOT NULL
              AND (%s::timestamptz IS NULL OR published_at >= %s::timestamptz)
              AND (%s::timestamptz IS NULL OR published_at <= %s::timestamptz)
              AND (%s::text IS NULL OR feed_title ILIKE %s::text)
              AND (%s::text IS NULL OR category = %s::text)
              AND (%s::bool = false OR read = false)
            ORDER BY published_at DESC
            LIMIT %s
        """
        params = (
            since_dt, since_dt,
            until_dt, until_dt,
            source, source_like,
            category, category,
            only_unread,
            limit,
        )
        with pg_conn() as conn:
            with conn.cursor() as cur:
                cur.execute(sql, params)
                rows = cur.fetchall()
                results = [_row_to_dict(cur, r) for r in rows]
        envelope = _build_window(since_dt, until_dt, as_of_dt)
        envelope["results"] = results
        return envelope

    @mcp.tool()
    def get_article(id: str) -> dict[str, Any]:
        """Fetch the full body + metadata for one article by FreshRSS id."""
        sql = """
            SELECT id, title, url, summary, published_at, ingested_at,
                   author, feed_id, feed_title, category, body_text,
                   body_source, extraction_status, read, starred
            FROM articles
            WHERE id = %s
        """
        with pg_conn() as conn:
            with conn.cursor() as cur:
                cur.execute(sql, (id,))
                row = cur.fetchone()
                if row is None:
                    raise ValueError(f"article not found: {id}")
                return _row_to_dict(cur, row)

    @mcp.tool()
    def list_recent(
        feed: str | None = None,
        category: str | None = None,
        only_unread: bool = False,
        limit: int = 20,
    ) -> list[dict[str, Any]]:
        """Metadata-only listing of recent articles — no body, no embedding."""
        feed_like = f"%{feed}%" if feed else None
        sql = """
            SELECT id, title, url, published_at, feed_title, category, read, starred,
                   extraction_status
            FROM articles
            WHERE (%s::text IS NULL OR feed_title ILIKE %s::text)
              AND (%s::text IS NULL OR category = %s::text)
              AND (%s::bool = false OR read = false)
            ORDER BY published_at DESC
            LIMIT %s
        """
        with pg_conn() as conn:
            with conn.cursor() as cur:
                cur.execute(sql, (feed, feed_like, category, category, only_unread, limit))
                rows = cur.fetchall()
                return [_row_to_dict(cur, r) for r in rows]

    @mcp.tool()
    def list_feeds() -> list[dict[str, Any]]:
        """Distinct feeds + categories observed in the local store."""
        sql = """
            SELECT feed_title, category, count(*) AS article_count,
                   max(published_at) AS latest_published_at
            FROM articles
            GROUP BY feed_title, category
            ORDER BY feed_title, category
        """
        with pg_conn() as conn:
            with conn.cursor() as cur:
                cur.execute(sql)
                rows = cur.fetchall()
                return [_row_to_dict(cur, r) for r in rows]

    @mcp.tool()
    def mark_read(id: str, read: bool = True) -> dict[str, Any]:
        """Mark an article read or unread. Calls FreshRSS first."""
        tag = "user/-/state/com.google/read"
        if read:
            _fr_edit_tag(id, add=tag)
        else:
            _fr_edit_tag(id, remove=tag)
        with pg_conn() as conn:
            with conn.cursor() as cur:
                cur.execute(
                    "UPDATE articles SET read=%s, state_synced_at=now() WHERE id=%s",
                    (read, id),
                )
                conn.commit()
        return {"status": "ok", "id": id, "read": read}

    @mcp.tool()
    def star(id: str, starred: bool = True) -> dict[str, Any]:
        """Star or unstar an article. Calls FreshRSS first."""
        tag = "user/-/state/com.google/starred"
        if starred:
            _fr_edit_tag(id, add=tag)
        else:
            _fr_edit_tag(id, remove=tag)
        with pg_conn() as conn:
            with conn.cursor() as cur:
                cur.execute(
                    "UPDATE articles SET starred=%s, state_synced_at=now() WHERE id=%s",
                    (starred, id),
                )
                conn.commit()
        return {"status": "ok", "id": id, "starred": starred}

    if __name__ == "__main__":
        log.info("starting news MCP server on 0.0.0.0:8080/mcp/")
        mcp.run(transport="streamable-http")
