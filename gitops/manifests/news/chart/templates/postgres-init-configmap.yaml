apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "news.componentLabels" (dict "component" "postgres" "ctx" .) | nindent 4 }}
data:
  init.sql: |
    -- Bootstrap SQL run once by the ankane/pgvector image on first start
    -- (any *.sql under /docker-entrypoint-initdb.d/ executes). Idempotent
    -- via IF NOT EXISTS, so re-running on a populated PVC is a no-op.
    CREATE EXTENSION IF NOT EXISTS vector;

    -- One row per article. Body, summary, and content hash live here so
    -- briefing queries never have to touch the vector index.
    CREATE TABLE IF NOT EXISTS articles (
      id                TEXT PRIMARY KEY,
      feed_id           TEXT NOT NULL,
      feed_title        TEXT,
      category          TEXT,
      title             TEXT,
      author            TEXT,
      url               TEXT NOT NULL,
      published_at      TIMESTAMPTZ NOT NULL,
      ingested_at       TIMESTAMPTZ NOT NULL DEFAULT now(),
      body_text         TEXT,
      body_source       TEXT NOT NULL,
      extraction_status TEXT NOT NULL,
      summary           TEXT,
      content_hash      TEXT NOT NULL,
      read              BOOLEAN NOT NULL DEFAULT false,
      starred           BOOLEAN NOT NULL DEFAULT false,
      state_synced_at   TIMESTAMPTZ
    );
    CREATE INDEX IF NOT EXISTS articles_published_idx ON articles (published_at DESC);
    CREATE INDEX IF NOT EXISTS articles_feed_idx      ON articles (feed_id, published_at DESC);
    CREATE INDEX IF NOT EXISTS articles_category_idx  ON articles (category, published_at DESC);

    -- Canonical chunks. Near-duplicates from syndicated coverage collapse to a
    -- single row via the cosine-similarity check at ingest time; citing
    -- articles link through chunk_articles. citation_ct is denormalized for
    -- fast filtering. Embedding dim ({{ .Values.litellm.embedDim }}) matches
    -- the configured embed model.
    CREATE TABLE IF NOT EXISTS chunks (
      id          BIGSERIAL PRIMARY KEY,
      text        TEXT NOT NULL,
      embedding   vector({{ .Values.litellm.embedDim }}) NOT NULL,
      citation_ct INT NOT NULL DEFAULT 1,
      created_at  TIMESTAMPTZ NOT NULL DEFAULT now()
    );
    CREATE INDEX IF NOT EXISTS chunks_hnsw ON chunks
      USING hnsw (embedding vector_cosine_ops);

    -- Join: which articles cite each chunk, in what position. Position
    -- corresponds to the chunk's index within the citing article's body.
    CREATE TABLE IF NOT EXISTS chunk_articles (
      chunk_id   BIGINT NOT NULL REFERENCES chunks(id) ON DELETE CASCADE,
      article_id TEXT   NOT NULL REFERENCES articles(id) ON DELETE CASCADE,
      position   INT    NOT NULL,
      PRIMARY KEY (chunk_id, article_id)
    );
    CREATE INDEX IF NOT EXISTS chunk_articles_article_idx ON chunk_articles (article_id);

    -- Named entities extracted by NER at ingest time. Used for the on-demand
    -- wiki tools and entity-aware briefing groupings. Embedding is of the
    -- canonical name (not the citing chunk) — used to fuzzy-match new
    -- mentions against existing entities.
    CREATE TABLE IF NOT EXISTS entities (
      id             BIGSERIAL PRIMARY KEY,
      canonical_name TEXT NOT NULL,
      kind           TEXT NOT NULL,
      embedding      vector({{ .Values.litellm.embedDim }}) NOT NULL,
      citation_ct    INT NOT NULL DEFAULT 0,
      first_seen_at  TIMESTAMPTZ NOT NULL DEFAULT now(),
      last_cited_at  TIMESTAMPTZ
    );
    CREATE UNIQUE INDEX IF NOT EXISTS entities_canonical_kind ON entities (canonical_name, kind);
    CREATE INDEX IF NOT EXISTS entities_hnsw ON entities
      USING hnsw (embedding vector_cosine_ops);

    -- Alternate names for an entity (e.g. "NVIDIA Corp" → "NVIDIA").
    CREATE TABLE IF NOT EXISTS entity_aliases (
      entity_id BIGINT NOT NULL REFERENCES entities(id) ON DELETE CASCADE,
      alias     TEXT   NOT NULL,
      PRIMARY KEY (entity_id, alias)
    );
    CREATE INDEX IF NOT EXISTS entity_aliases_alias_idx ON entity_aliases (alias);

    -- Each mention links an entity, the citing article, and the specific
    -- chunk that mentioned it (so we can show the exact passage).
    CREATE TABLE IF NOT EXISTS entity_mentions (
      entity_id  BIGINT NOT NULL REFERENCES entities(id) ON DELETE CASCADE,
      article_id TEXT   NOT NULL REFERENCES articles(id) ON DELETE CASCADE,
      chunk_id   BIGINT REFERENCES chunks(id) ON DELETE SET NULL,
      PRIMARY KEY (entity_id, article_id, chunk_id)
    );
    CREATE INDEX IF NOT EXISTS entity_mentions_article_idx ON entity_mentions (article_id);

    -- On-demand wiki pages. is_dirty is flipped TRUE when a new mention
    -- lands; the MCP get_wiki tool regens the body on next read (with a
    -- short debounce floor to prevent thrash on hot entities).
    CREATE TABLE IF NOT EXISTS wiki_pages (
      entity_id          BIGINT PRIMARY KEY REFERENCES entities(id) ON DELETE CASCADE,
      body               TEXT NOT NULL,
      generated_at       TIMESTAMPTZ NOT NULL DEFAULT now(),
      citation_ct_at_gen INT NOT NULL,
      is_dirty           BOOLEAN NOT NULL DEFAULT FALSE
    );

    -- Single-row high-water table for incremental ingest.
    CREATE TABLE IF NOT EXISTS ingest_state (
      id                        INT PRIMARY KEY DEFAULT 1 CHECK (id = 1),
      last_successful_run_at    TIMESTAMPTZ,
      last_article_published_at TIMESTAMPTZ,
      backfill_completed        BOOLEAN NOT NULL DEFAULT false
    );
    INSERT INTO ingest_state (id) VALUES (1) ON CONFLICT (id) DO NOTHING;

    -- One row per ingest invocation; backs the web UI's ops dashboard.
    CREATE TABLE IF NOT EXISTS ingest_runs (
      id              BIGSERIAL PRIMARY KEY,
      started_at      TIMESTAMPTZ NOT NULL DEFAULT now(),
      finished_at     TIMESTAMPTZ,
      status          TEXT NOT NULL DEFAULT 'running',
      items_fetched   INT  NOT NULL DEFAULT 0,
      items_inserted  INT  NOT NULL DEFAULT 0,
      chunks_inserted INT  NOT NULL DEFAULT 0,
      chunks_dedup    INT  NOT NULL DEFAULT 0,
      metrics         JSONB NOT NULL DEFAULT '{}'::jsonb,
      errors          JSONB NOT NULL DEFAULT '[]'::jsonb,
      trigger         TEXT NOT NULL DEFAULT 'cron'
    );
    CREATE INDEX IF NOT EXISTS ingest_runs_started_idx ON ingest_runs (started_at DESC);
