---
# Materializes the Secret that argocd-notifications-controller reads at
# delivery time. The controller resolves `$webhook-hmac-secret` in
# argocd-notifications-cm by looking up that key in the well-known
# Secret named `argocd-notifications-secret`. So we write directly into
# that Secret name with the right key.
#
# Required: set `notifications.secret.create: false` in argocd-self.yaml
# helm values so the chart does NOT also create an empty Secret of the
# same name — otherwise the chart and sm-operator fight for ownership.
#
# Hermes uses the X-Gitlab-Token static-shared-secret auth path (not
# body-HMAC) because Argo CD Notifications can only set static header
# values; it cannot compute HMAC of the body inside its Go templates.
# Security property: anyone who can read this Secret can forge a
# notification webhook to Hermes — identical posture to the HMAC case.
#
# Same bwSecretId as the hermes-side webhook-hmac — one shared HMAC
# across the whole webhook fabric for v1.
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: webhook-hmac
  namespace: argocd
spec:
  organizationId: c046a20a-413d-4b54-8a56-b1790122c5ef
  secretName: argocd-notifications-secret
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: 28a9655e-1d93-45e5-97e9-b44e00035064
      secretKeyName: webhook-hmac-secret
