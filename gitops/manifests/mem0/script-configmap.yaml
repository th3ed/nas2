---
# FastMCP wrapper around the Mem0 OSS library. Single file; mounted into
# the mem0-mcp container at /app/mem0_mcp.py. The container is a vanilla
# python:3.12-slim — the wrapper does `from mem0 import Memory` + exposes
# six MCP tools (add/search/get/list/update/delete) over streamable HTTP.
#
# Why not the Mem0 REST server: Mem0 doesn't publish a server image and
# library mode is their documented first-class OSS path. Library mode
# means the same pod that serves MCP also holds the Memory instance, so
# there's no internal REST hop and no second container to keep in sync.
#
# Config note: Mem0's pgvector provider auto-creates the `memories`
# table and runs CREATE EXTENSION vector on first use (postgres-init-
# configmap.yaml already does the CREATE EXTENSION proactively in case
# Mem0's check ever changes). LLM + embedder both route through LiteLLM
# (provider: openai with openai_base_url override) so Ollama-served
# nomic-embed-text + gemma4 stay local; see
# gitops/manifests/litellm/values.yaml for the model aliases.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mem0-mcp-script
  namespace: mem0
data:
  mem0_mcp.py: |
    """Mem0 long-term memory exposed as an MCP server (streamable HTTP)."""
    from __future__ import annotations

    import logging
    import os
    from typing import Any

    from mcp.server.fastmcp import FastMCP
    from mem0 import Memory

    logging.basicConfig(
        level=logging.INFO,
        format="%(asctime)s %(levelname)s %(name)s %(message)s",
    )
    log = logging.getLogger("mem0-mcp")

    PG_HOST = os.environ["MEM0_PG_HOST"]
    PG_PORT = int(os.environ.get("MEM0_PG_PORT", "5432"))
    PG_DB = os.environ.get("MEM0_PG_DB", "postgres")
    PG_USER = os.environ.get("MEM0_PG_USER", "postgres")
    PG_PASSWORD = os.environ["POSTGRES_PASSWORD"]

    LITELLM_URL = os.environ["LITELLM_BASE_URL"]
    LITELLM_KEY = os.environ["LITELLM_API_KEY"]

    LLM_MODEL = os.environ.get("MEM0_LLM_MODEL", "gemma4:e4b")
    EMBED_MODEL = os.environ.get("MEM0_EMBED_MODEL", "text-embedding-3-small")
    EMBED_DIMS = int(os.environ.get("MEM0_EMBED_DIMS", "768"))

    DEFAULT_USER_ID = os.environ.get("MEM0_DEFAULT_USER_ID", "ed")

    config: dict[str, Any] = {
        "vector_store": {
            "provider": "pgvector",
            "config": {
                "host": PG_HOST,
                "port": PG_PORT,
                "dbname": PG_DB,
                "user": PG_USER,
                "password": PG_PASSWORD,
                "collection_name": "memories",
                "embedding_model_dims": EMBED_DIMS,
            },
        },
        "llm": {
            "provider": "openai",
            "config": {
                "model": LLM_MODEL,
                "openai_base_url": LITELLM_URL,
                "api_key": LITELLM_KEY,
                "temperature": 0.2,
            },
        },
        "embedder": {
            "provider": "openai",
            "config": {
                "model": EMBED_MODEL,
                "openai_base_url": LITELLM_URL,
                "api_key": LITELLM_KEY,
                "embedding_dims": EMBED_DIMS,
            },
        },
    }

    log.info("initializing Mem0 with pgvector=%s:%s db=%s", PG_HOST, PG_PORT, PG_DB)
    memory = Memory.from_config(config)

    # Host/port via constructor kwargs — FastMCP's Settings does read
    # FASTMCP_HOST/FASTMCP_PORT env vars in theory, but the version pinned
    # here (mcp ~1.x) silently ignores them and binds to 127.0.0.1:8000.
    # Passing them as constructor kwargs writes directly to settings.
    mcp = FastMCP(
        name="memory",
        instructions=(
            "Long-term memory for cross-session user facts and preferences, "
            "backed by Mem0 + pgvector. Call memory_search BEFORE responding "
            "when the user references prior conversations or stated facts. "
            "Call memory_add AFTER turns where the user states a durable "
            "preference, fact, or decision worth remembering across sessions. "
            "Do not store ephemeral task state — that belongs in session/plan files."
        ),
        host=os.environ.get("FASTMCP_HOST", "0.0.0.0"),
        port=int(os.environ.get("FASTMCP_PORT", "8080")),
    )


    def _normalize_results(result: Any) -> list[dict[str, Any]]:
        """Mem0 returns either a list or a dict with `results` depending on version."""
        if isinstance(result, dict) and "results" in result:
            return result["results"]
        if isinstance(result, list):
            return result
        return []


    @mcp.tool()
    def memory_add(
        content: str,
        user_id: str | None = None,
        metadata: dict[str, Any] | None = None,
    ) -> dict[str, Any]:
        """Store a user-stated durable fact or preference. Mem0 extracts and
        deduplicates salient facts server-side.

        Args:
            content: the raw statement to remember (e.g. "I prefer terse responses").
            user_id: scope the memory to a specific user; defaults to the
                pod's MEM0_DEFAULT_USER_ID.
            metadata: optional tags (e.g. {"source": "telegram"}).
        """
        uid = user_id or DEFAULT_USER_ID
        return memory.add(
            messages=[{"role": "user", "content": content}],
            user_id=uid,
            metadata=metadata or {},
        )


    @mcp.tool()
    def memory_search(
        query: str,
        user_id: str | None = None,
        top_k: int = 5,
    ) -> list[dict[str, Any]]:
        """Search prior memories for facts relevant to the query.

        Returns top_k entries ranked by semantic similarity, each with
        id, memory text, and metadata.
        """
        uid = user_id or DEFAULT_USER_ID
        return _normalize_results(memory.search(query=query, user_id=uid, limit=top_k))


    @mcp.tool()
    def memory_get(memory_id: str) -> dict[str, Any]:
        """Fetch a single memory by its ID."""
        return memory.get(memory_id=memory_id)


    @mcp.tool()
    def memory_list(user_id: str | None = None) -> list[dict[str, Any]]:
        """List every stored memory for the user (for inspection/debugging)."""
        uid = user_id or DEFAULT_USER_ID
        return _normalize_results(memory.get_all(user_id=uid))


    @mcp.tool()
    def memory_update(memory_id: str, text: str) -> dict[str, Any]:
        """Replace an existing memory's text content."""
        return memory.update(memory_id=memory_id, data=text)


    @mcp.tool()
    def memory_delete(memory_id: str) -> dict[str, str]:
        """Delete a memory by its ID."""
        memory.delete(memory_id=memory_id)
        return {"status": "deleted", "id": memory_id}


    if __name__ == "__main__":
        log.info("starting MCP server on 0.0.0.0:8080/mcp/ (streamable-http)")
        mcp.run(transport="streamable-http")
