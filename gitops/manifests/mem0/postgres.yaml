---
# pgvector backing store for Mem0. Same image tag (`ankane/pgvector:v0.5.1`)
# Mem0's upstream docker-compose pins, so we stay on the version their
# integration tests cover.
apiVersion: v1
kind: Service
metadata:
  name: mem0-postgres
  namespace: mem0
spec:
  selector:
    app.kubernetes.io/name: mem0-postgres
  ports:
    - name: pg
      port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mem0-postgres
  namespace: mem0
  labels:
    app.kubernetes.io/name: mem0-postgres
spec:
  serviceName: mem0-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mem0-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mem0-postgres
    spec:
      containers:
        - name: postgres
          image: ankane/pgvector:v0.5.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: pg
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mem0-secrets
                  key: POSTGRES_PASSWORD
            # PGDATA points at a subdir so the PVC root stays clean and the
            # initdb safety check (must be empty) doesn't trip on lost+found.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 1Gi
      volumes:
        - name: init
          configMap:
            name: mem0-postgres-init
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 128Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
