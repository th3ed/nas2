---
# pgvector backing store for Mem0. Same image tag (`ankane/pgvector:v0.5.1`)
# Mem0's upstream docker-compose pins, so we stay on the version their
# integration tests cover.
apiVersion: v1
kind: Service
metadata:
  name: mem0-postgres
  namespace: mem0
spec:
  selector:
    app.kubernetes.io/name: mem0-postgres
  ports:
    - name: pg
      port: 5432
      targetPort: 5432
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mem0-postgres
  namespace: mem0
  labels:
    app.kubernetes.io/name: mem0-postgres
spec:
  serviceName: mem0-postgres
  replicas: 1
  # Explicit defaults the apiserver would set anyway. Spelling them out
  # keeps Argo SSA diff from flagging them as drift on every reconcile.
  # Argo normalizes most Deployment defaults but doesn't reach into a
  # StatefulSet's volumeClaimTemplates or updateStrategy.
  podManagementPolicy: OrderedReady
  revisionHistoryLimit: 10
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: mem0-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mem0-postgres
    spec:
      # Apiserver-defaulted PodSpec fields. Argo's normalizer fills these
      # in for Deployments but not for StatefulSet pod templates, so the
      # StatefulSet pins to OutOfSync every reconcile until we spell them
      # out. Same root cause as the podManagementPolicy fix above.
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgres
          image: ankane/pgvector:v0.5.1
          imagePullPolicy: IfNotPresent
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          ports:
            - name: pg
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mem0-secrets
                  key: POSTGRES_PASSWORD
            # PGDATA points at a subdir so the PVC root stays clean and the
            # initdb safety check (must be empty) doesn't trip on lost+found.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres", "-d", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 1
            successThreshold: 1
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 1Gi
      volumes:
        - name: init
          configMap:
            name: mem0-postgres-init
            defaultMode: 420
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 128Mi
  volumeClaimTemplates:
    # apiVersion/kind/volumeMode are apiserver defaults on embedded PVC
    # templates; Argo's StatefulSet normalizer doesn't fill them in, so
    # without them the StatefulSet drifts on every reconcile.
    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        volumeMode: Filesystem
        resources:
          requests:
            storage: 5Gi
