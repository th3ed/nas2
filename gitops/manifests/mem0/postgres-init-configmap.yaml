---
# Bootstrap SQL run once by the ankane/pgvector image on first start (any
# *.sql or *.sh under /docker-entrypoint-initdb.d/ is executed). pgvector
# ships the extension binaries; we still have to `CREATE EXTENSION` per
# database before mem0ai's pgvector store can write vectors.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mem0-postgres-init
  namespace: mem0
data:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;
