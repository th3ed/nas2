---
image:
  repository: ghcr.io/berriai/litellm

db:
  deployStandalone: false

migrationJob:
  enabled: false

environmentSecrets:
  - litellm-secrets

# Presidio Analyzer/Anonymizer Service URLs. Read by LiteLLM at startup to
# wire the `presidio` guardrail defined below. Deployed by the `presidio`
# Argo app (sync wave 10, sm-operator-free namespace).
envVars:
  PRESIDIO_ANALYZER_API_BASE: "http://presidio-analyzer.presidio:3000"
  PRESIDIO_ANONYMIZER_API_BASE: "http://presidio-anonymizer.presidio:3000"
  OTEL_EXPORTER: "otlp_http"
  OTEL_ENDPOINT: "http://alloy.monitoring.svc.cluster.local:4318"
  PROMETHEUS_MULTIPROC_DIR: "/tmp/prometheus_multiproc"

volumes:
  - name: prometheus-multiproc
    emptyDir: {}
  # See callbacks-configmap.yaml. LiteLLM resolves callback modules
  # relative to the config file's directory via
  # importlib.util.spec_from_file_location — not sys.path. Config is
  # mounted at /etc/litellm/config.yaml, so the callback must live at
  # /etc/litellm/gemma_tool_rewrite.py. See
  # /usr/lib/python3.13/site-packages/litellm/proxy/types_utils/utils.py
  # (get_instance_fn).
  - name: callbacks
    configMap:
      name: litellm-callbacks

volumeMounts:
  - name: prometheus-multiproc
    mountPath: /tmp/prometheus_multiproc
  - name: callbacks
    mountPath: /etc/litellm/gemma_tool_rewrite.py
    subPath: gemma_tool_rewrite.py
    readOnly: true

proxy_config:
  model_list:
    - model_name: "gemma4:e4b"
      litellm_params:
        model: "ollama_chat/gemma4:e4b"
        api_base: "http://ollama.ollama:11434"
    - model_name: "qwen3-coder-next:latest"
      litellm_params:
        model: "ollama_chat/qwen3-coder-next:latest"
        api_base: "http://ollama.ollama:11434"
    - model_name: "qwen3:4b-instruct-2507-q8_0"
      litellm_params:
        model: "ollama_chat/qwen3:4b-instruct-2507-q8_0"
        api_base: "http://ollama.ollama:11434"
    # Embedding alias. Mem0's server bundles only openai/gemini as
    # embedder providers and rejects `provider: ollama` at config
    # validation (server/main.py BUNDLED_EMBEDDER_PROVIDERS). Routing
    # OpenAI-style embedding calls through this alias lets Mem0 use
    # nomic-embed-text on local Ollama via provider=openai +
    # openai_base_url=litellm. 768-dim; embedding_model_dims in
    # gitops/manifests/mem0/deployment.yaml MEM0_EMBED_DIMS must match.
    - model_name: "text-embedding-3-small"
      litellm_params:
        model: "ollama/nomic-embed-text"
        api_base: "http://ollama.ollama:11434"
    # bge-m3 (1024-dim) was added here for news-rag but rolled back —
    # see gitops/manifests/news-rag/postgres-init-configmap.yaml: the
    # nas2 RTX (10 GB) can't fit bge-m3's 8192-token batch alongside
    # the loaded chat models, so news-rag uses text-embedding-3-small
    # (nomic-embed-text, 768-dim) like mem0 does. Re-add this alias if
    # a larger-VRAM GPU becomes the embed target.
    # OpenRouter-backed cloud models. Each carries the presidio-pii guardrail
    # so prompts are masked before leaving the tailnet and unmasked on the
    # way back (output_parse_pii=True). Local ollama entries above stay raw.
    - model_name: "claude-opus-4.7"
      litellm_params:
        model: "openrouter/anthropic/claude-opus-4.7"
        api_key: "os.environ/OPENROUTER_API_KEY"
        guardrails: ["presidio-pii"]
    - model_name: "claude-sonnet-4.6"
      litellm_params:
        model: "openrouter/anthropic/claude-sonnet-4.6"
        api_key: "os.environ/OPENROUTER_API_KEY"
        guardrails: ["presidio-pii"]
    - model_name: "claude-haiku-4.5"
      litellm_params:
        model: "openrouter/anthropic/claude-haiku-4.5"
        api_key: "os.environ/OPENROUTER_API_KEY"
        guardrails: ["presidio-pii"]
    - model_name: "kimi-k2.6"
      litellm_params:
        model: "openrouter/moonshotai/kimi-k2.6"
        api_key: "os.environ/OPENROUTER_API_KEY"
        guardrails: ["presidio-pii"]
    - model_name: "glm-5.1"
      litellm_params:
        model: "openrouter/z-ai/glm-5.1"
        api_key: "os.environ/OPENROUTER_API_KEY"
        guardrails: ["presidio-pii"]
    - model_name: "deepseek-v4-flash"
      litellm_params:
        model: "openrouter/deepseek/deepseek-v4-flash"
        api_key: "os.environ/OPENROUTER_API_KEY"
        guardrails: ["presidio-pii"]
    - model_name: "deepseek-v4-pro"
      litellm_params:
        model: "openrouter/deepseek/deepseek-v4-pro"
        api_key: "os.environ/OPENROUTER_API_KEY"
        guardrails: ["presidio-pii"]
    # Gemini free-tier models via Google AI Studio. presidio-pii guardrail masks
    # PII before requests leave the tailnet (same policy as OpenRouter models).
    - model_name: "gemini-2.5-flash"
      litellm_params:
        model: "gemini/gemini-2.5-flash"
        api_key: "os.environ/GEMINI_API_KEY"
        guardrails: ["presidio-pii"]
    - model_name: "gemini-2.5-pro"
      litellm_params:
        model: "gemini/gemini-2.5-pro"
        api_key: "os.environ/GEMINI_API_KEY"
        guardrails: ["presidio-pii"]
    - model_name: "gemini-2.0-flash"
      litellm_params:
        model: "gemini/gemini-2.0-flash"
        api_key: "os.environ/GEMINI_API_KEY"
        guardrails: ["presidio-pii"]
  guardrails:
    - guardrail_name: "presidio-pii"
      litellm_params:
        guardrail: presidio
        mode: "pre_call"
        presidio_language: "en"
        presidio_filter_scope: "both"
        output_parse_pii: True
        # PERSON and IP_ADDRESS deliberately omitted. PERSON is spaCy-NER
        # based and false-flags technical tokens at the same score as real
        # names ("gemma", "Email", "ollama.ollama:11434", identifier
        # names all return PERSON@0.85), and LiteLLM's reverse-mapping
        # leaves placeholders embedded in longer tokens unrestored
        # (gem<PERSON_30>:e4b). IP_ADDRESS is a clean regex but mangles
        # the cluster/MetalLB/private IPs that fill our infra prompts.
        # The remaining entries are deterministic regex recognizers.
        pii_entities_config:
          EMAIL_ADDRESS: "MASK"
          CREDIT_CARD: "MASK"
          US_SSN: "MASK"
          PHONE_NUMBER: "MASK"
          IBAN_CODE: "MASK"
  litellm_settings:
    # gemma_tool_rewrite.handler: pre_call_hook that rewrites role:tool ->
    # role:user for ollama gemma models (gemma's chat renderer silently
    # drops role:tool messages, looping web_search forever). See
    # callbacks-configmap.yaml and the mount under /app/ above.
    callbacks: ["gemma_tool_rewrite.handler", "prometheus", "otel"]
    # drop_params=True lets LiteLLM strip provider-unsupported request
    # fields (e.g. `encoding_format: base64` that the OpenAI Python client
    # always sends on embeddings; Ollama's embedding endpoint rejects it
    # with 400 UnsupportedParamsError). Required for Mem0 → LiteLLM →
    # Ollama nomic-embed-text to round-trip.
    drop_params: true
  general_settings:
    master_key: os.environ/LITELLM_MASTER_KEY
