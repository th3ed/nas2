---
# Bitwarden Secrets Manager mapping for n8n runtime secrets.
# The auth-token Secret (bw-auth-token) is created out-of-band by the
# argocd_bootstrap Ansible role from vault_bitwarden_sm_token.
apiVersion: k8s.bitwarden.com/v1
kind: BitwardenSecret
metadata:
  name: n8n-secrets
  namespace: n8n
spec:
  organizationId: c046a20a-413d-4b54-8a56-b1790122c5ef
  secretName: n8n-secrets
  authToken:
    secretName: bw-auth-token
    secretKey: token
  map:
    - bwSecretId: 2588e105-9f5d-4370-85e4-b449001db2ee
      secretKeyName: N8N_ENCRYPTION_KEY
