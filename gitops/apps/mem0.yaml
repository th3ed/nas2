---
# Self-hosted long-term memory for Hermes (and any other MCP client on the
# tailnet — opencode, Claude Desktop, etc.).
#
# Stack: one Postgres+pgvector StatefulSet for the vector store, one
# Deployment running the official `mem0ai` library in-process behind a
# FastMCP wrapper. There is no Mem0 REST server (Mem0 doesn't publish a
# server image and we have no need for the extra hop — library mode is the
# Mem0 team's documented OSS path).
#
# Sync wave 15 places this before hermes (wave 20). Hermes' mcp_servers
# entry will retry on its own, so strict ordering is a nice-to-have rather
# than a hard requirement.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mem0
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "15"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/th3ed/nas2.git
    targetRevision: main
    path: gitops/manifests/mem0
  destination:
    server: https://kubernetes.default.svc
    namespace: mem0
  # Three apiserver-default fields Argo can't normalize on StatefulSets:
  #   - spec.template.metadata.creationTimestamp (null on every create)
  #   - spec.volumeClaimTemplates[].metadata.creationTimestamp (same)
  #   - spec.volumeClaimTemplates[].status (runtime PVC status leaks into
  #     the StatefulSet object: e.g. {phase: Pending})
  # The other ~13 defaulted PodSpec fields are spelled out in
  # gitops/manifests/mem0/postgres.yaml; these three can't be cleanly
  # written in git, so ignoreDifferences is the only correct fix.
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jqPathExpressions:
        - '.spec.template.metadata.creationTimestamp'
        - '.spec.volumeClaimTemplates[].metadata.creationTimestamp'
        - '.spec.volumeClaimTemplates[].status'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
