---
# Persistent infrastructure for the dev-agent loop: the agents namespace
# itself plus the wrapper-script ConfigMap, ServiceAccount, and the
# BitwardenSecret holding a copy of the LiteLLM master key.
#
# The dev-agent Job spec itself is NOT in this manifest set — it's a
# per-issue ephemeral resource that the agent-controller renders and
# applies at runtime. For manual testing, use the template at
# scripts/dev-agent/job-template.yaml.
#
# Sync wave 20 alongside ollama / openclaw (other GPU-adjacent workloads).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-agent
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/th3ed/nas2.git
    targetRevision: main
    path: gitops/manifests/dev-agent
    directory:
      # Don't recurse into src/ — those are non-manifest source files
      # for the payload ConfigMap (regenerated by
      # scripts/regen-dev-agent-configmap.py).
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: agents
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
