---
# Persistent infrastructure for the pr-reviewer loop: the wrapper-script
# ConfigMap. The litellm-master Secret and dev-agent ServiceAccount are
# already provisioned by the dev-agent Application (both are reused —
# the reviewer has the same Kubernetes trust posture as dev-agent: it
# talks only to LiteLLM, no GH token, no Bitwarden access).
#
# The pr-reviewer Job spec itself is NOT in this manifest set — it's a
# per-PR-event ephemeral resource that the agent-controller renders and
# applies at runtime. For manual testing, use the template at
# scripts/pr-reviewer/job-template.yaml.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pr-reviewer
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/th3ed/nas2.git
    targetRevision: main
    path: gitops/manifests/pr-reviewer
    directory:
      # Don't recurse into src/ — non-manifest source files for the
      # payload ConfigMap (regenerated by
      # scripts/regen-pr-reviewer-configmap.py).
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: agents
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
