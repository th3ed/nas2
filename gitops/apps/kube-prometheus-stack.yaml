---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 65.5.1
      helm:
        releaseName: kps
        valueFiles:
          - $values/gitops/manifests/kube-prometheus-stack/values.yaml
    - repoURL: https://github.com/th3ed/nas2.git
      targetRevision: k8s
      ref: values
    - repoURL: https://github.com/th3ed/nas2.git
      targetRevision: k8s
      path: gitops/manifests/kube-prometheus-stack
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
