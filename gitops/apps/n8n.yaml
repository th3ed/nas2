---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: 8gears.container-registry.com/library
      chart: n8n
      targetRevision: "2.0.1"
      helm:
        releaseName: n8n
        valueFiles:
          - $values/gitops/manifests/n8n/values.yaml
    - repoURL: https://github.com/th3ed/nas2.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/th3ed/nas2.git
      targetRevision: main
      path: gitops/manifests/n8n
  destination:
    server: https://kubernetes.default.svc
    namespace: n8n
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
