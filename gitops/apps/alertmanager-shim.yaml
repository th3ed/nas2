---
# Tiny HTTP service in monitoring namespace that HMAC-signs Alertmanager
# webhook POSTs and forwards them to hermes-webhook with an
# X-Hub-Signature-256 header (the only auth scheme Hermes accepts for
# body-signed routes). Alertmanager's webhook_config has no custom-header
# or body-HMAC support, hence the shim. See app.py.
#
# Sync wave 6 — after monitoring stack (wave 5), before alertmanager
# config references this service.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alertmanager-shim
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/th3ed/nas2.git
    targetRevision: main
    path: gitops/manifests/alertmanager-shim
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
