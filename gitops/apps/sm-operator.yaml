---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sm-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # NOTE: verify the source path before first apply. The bitwarden/sm-kubernetes
  # repo provides install via either a deploy/ directory of manifests OR a Helm
  # chart at oci://ghcr.io/bitwarden/sm-operator-chart. If the path/chart name
  # differs from the values below, switch to the OCI chart form (see
  # https://bitwarden.com/help/secrets-manager-kubernetes-operator/).
  source:
    repoURL: https://github.com/bitwarden/sm-kubernetes.git
    targetRevision: main
    path: deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: sm-operator-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
