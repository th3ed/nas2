---
nvidia_cuda_repo_distro: ubuntu2604
nvidia_driver_package: cuda-drivers

docker_users:
  - ed
docker_apt_release: noble

tailscale_apt_release: noble
tailscale_authkey: "{{ vault_tailscale_authkey }}"

cuda_version: "12.6.0"
cuda_image: "nvidia/cuda:{{ cuda_version }}-cudnn-devel-ubuntu24.04"

ollama_image: ollama/ollama:0.21.2
ollama_bind: "127.0.0.1:11434"
ollama_data_volume: /var/lib/ollama
ollama_models:
  - qwen3-coder-next:latest
  - gemma4:e4b

openclaw_image: ghcr.io/openclaw/openclaw:2026.4.25-beta.4-slim

shell_user: ed
shell_zsh_theme: robbyrussell
shell_zsh_plugins:
  - git
  - docker
  - zsh-autosuggestions
  - zsh-syntax-highlighting

console_fontface: Terminus
console_fontsize: 32x16

wifi_country: US

caddy_tailscale_hostname: nas2.taile9c9c.ts.net
caddy_tailscale_cert: /etc/caddy/nas2.crt
caddy_tailscale_key: /etc/caddy/nas2.key

firewall_allowed_tcp_ports:
  - "22"
  - "80"
  - "443"
  - "6443"

# Tailnet domain — used for Tailscale Operator MagicDNS hostnames
# (e.g. ollama.taile9c9c.ts.net). Source of truth for the suffix in
# caddy_tailscale_hostname above.
tailnet_domain: taile9c9c.ts.net

# k3s
k3s_version: "v1.32.1+k3s1"

# Argo CD / GitOps
gitops_repo_url: "https://github.com/th3ed/nas2.git"
gitops_repo_branch: "k8s"
gitops_apps_path: "gitops/apps"

# Vault keys to add via `ansible-vault edit group_vars/all/vault.yml`:
#   vault_bitwarden_sm_token                  — Bitwarden Secrets Manager machine-account access token
#   vault_tailscale_operator_oauth_client_id  — Tailscale OAuth client ID (k8s-operator scope)
#   vault_tailscale_operator_oauth_client_secret
#   vault_grafana_admin_password
