---
- name: Configure nas2 for GPU-accelerated containers
  hosts: gpu_hosts
  gather_facts: true

  roles:
    - { role: common,                     tags: [common] }
    - { role: console_font,               tags: [console_font] }
    - { role: nvidia_driver,              tags: [nvidia_driver, gpu] }
    - { role: docker,                     tags: [docker] }
    - { role: nvidia_container_toolkit,   tags: [nvidia_container_toolkit, gpu] }
    - { role: cuda,                       tags: [cuda, gpu] }
    - { role: tailscale,                  tags: [tailscale] }
    - { role: k3s,                        tags: [k3s, kubernetes] }
    - { role: kubectl,                    tags: [kubectl, kubernetes] }
    - { role: argocd_bootstrap,           tags: [argocd, kubernetes] }
    - { role: user_shell,                 tags: [user_shell] }
    - { role: claude_code,                tags: [claude_code] }
    - { role: wifi,                       tags: [wifi] }
    - { role: firewall,                   tags: [firewall] }
