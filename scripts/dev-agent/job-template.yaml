---
# Manual dev-agent invocation. Two-step recipe so the issue ConfigMap
# isn't clobbered each time the Job is re-applied:
#
#   # 1. Create / overwrite the issue body (separate from this file):
#   kubectl create configmap dev-agent-manual-issue -n agents \
#       --from-file=issue.md=/path/to/your-issue.md \
#       --dry-run=client -o yaml | kubectl apply -f -
#
#   # 2. Spawn the Job (will create the PVC on first apply):
#   kubectl delete job dev-agent-manual -n agents --ignore-not-found
#   kubectl apply -f scripts/dev-agent/job-template.yaml
#
#   # 3. Watch progress (Pod runs ~3-5 min on first invocation; later
#   # invocations skip the apt/bun install once we pre-bake the image):
#   kubectl -n agents logs -f job/dev-agent-manual
#
#   # 4. (For pr-pusher integration) the patch lands in the
#   #   agent-workspace-manual PVC at /workspace/.patch — apply
#   #   scripts/pr-pusher/job-template.yaml next.
#
# This is throwaway — agent-controller will replace this with a
# templated apply per issue.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agent-workspace-manual
  namespace: agents
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: dev-agent-manual
  namespace: agents
spec:
  ttlSecondsAfterFinished: 7200
  activeDeadlineSeconds: 1800
  backoffLimit: 0
  template:
    metadata:
      annotations:
        # bun JSC GC fails (exit 133) under K8s default AppArmor — see
        # memory `project_opencode_apparmor`.
        container.apparmor.security.beta.kubernetes.io/agent: unconfined
    spec:
      restartPolicy: Never
      serviceAccountName: dev-agent
      automountServiceAccountToken: false
      # MVP: runs as root so `apt-get install` + `bun install -g
      # opencode-ai` can write to /usr/local. Pre-baked image (follow-up)
      # will let us drop back to non-root.
      securityContext: {}
      containers:
        - name: agent
          image: oven/bun:1-debian
          command: ["bash", "/opt/payload/run.sh"]
          env:
            - name: OPENAI_BASE_URL
              value: "http://litellm.litellm:4000/v1"
            - name: ISSUE_BODY_PATH
              value: /opt/issue/issue.md
            - name: ISSUE_NUMBER
              value: "manual"
            - name: MODEL
              value: "litellm/qwen3-coder-next:latest"
            - name: HOME
              value: /root
          envFrom:
            - secretRef:
                name: litellm-master
          resources:
            requests: { cpu: 200m, memory: 1Gi }
            limits: { cpu: 2, memory: 4Gi }
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: payload
              mountPath: /opt/payload
              readOnly: true
            - name: issue
              mountPath: /opt/issue
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: agent-workspace-manual
        - name: tmp
          emptyDir: { sizeLimit: 512Mi }
        - name: payload
          configMap:
            name: dev-agent-payload
            defaultMode: 0755
        - name: issue
          configMap:
            name: dev-agent-manual-issue
