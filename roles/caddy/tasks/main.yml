---
- name: Ensure /etc/apt/keyrings exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Install Caddy apt signing key
  ansible.builtin.get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    dest: /etc/apt/keyrings/caddy-stable.asc
    mode: "0644"
  check_mode: false

- name: Add Caddy apt repo
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/caddy-stable.asc] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
    filename: caddy-stable
    state: present
    update_cache: true

- name: Install caddy
  ansible.builtin.apt:
    name: caddy
    state: present

- name: Obtain Tailscale TLS certificate
  ansible.builtin.command:
    cmd: >
      tailscale cert
      --cert-file {{ caddy_tailscale_cert }}
      --key-file {{ caddy_tailscale_key }}
      {{ caddy_tailscale_hostname }}
  changed_when: false

- name: Set cert ownership for caddy user
  ansible.builtin.file:
    path: "{{ item }}"
    owner: caddy
    group: caddy
    mode: "0640"
  loop:
    - "{{ caddy_tailscale_cert }}"
    - "{{ caddy_tailscale_key }}"

- name: Deploy Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "0644"
  notify: Reload caddy

- name: Deploy Tailscale cert renewal systemd service
  ansible.builtin.template:
    src: tailscale-cert-renew.service.j2
    dest: /etc/systemd/system/tailscale-cert-renew.service
    mode: "0644"

- name: Deploy Tailscale cert renewal systemd timer
  ansible.builtin.template:
    src: tailscale-cert-renew.timer.j2
    dest: /etc/systemd/system/tailscale-cert-renew.timer
    mode: "0644"
  notify: Enable tailscale cert renewal timer

- name: Enable and start caddy
  ansible.builtin.systemd:
    name: caddy
    enabled: true
    state: started
    daemon_reload: true
