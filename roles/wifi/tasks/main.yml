---
- name: Install wireless-regdb and iw
  ansible.builtin.apt:
    name:
      - wireless-regdb
      - iw
    state: present

- name: Set wireless regulatory domain
  ansible.builtin.lineinfile:
    path: /etc/default/crda
    regexp: '^REGDOMAIN='
    line: "REGDOMAIN={{ wifi_country }}"
    create: true
    mode: "0644"

- name: Apply regulatory domain now
  ansible.builtin.command: "iw reg set {{ wifi_country }}"
  changed_when: false
  failed_when: false

# Per-SSID 5/6 GHz band locking must be done manually with knowledge of
# the SSID, e.g. `nmcli con mod <SSID> wifi.band a`. Not templated here.
- name: Disable wifi powersave globally in NetworkManager
  ansible.builtin.copy:
    dest: /etc/NetworkManager/conf.d/10-wifi-powersave.conf
    mode: "0644"
    content: |
      [connection]
      wifi.powersave = 2
  notify: Restart NetworkManager
