---
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set UFW default incoming policy to deny
  community.general.ufw:
    default: deny
    direction: incoming

- name: Set UFW default outgoing policy to allow
  community.general.ufw:
    default: allow
    direction: outgoing

- name: Allow forwarding (required for k3s/flannel pod traffic)
  community.general.ufw:
    default: allow
    direction: routed

- name: Allow SSH, HTTP, HTTPS
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: "{{ firewall_allowed_tcp_ports }}"

- name: Allow all traffic on tailscale0 interface
  community.general.ufw:
    rule: allow
    interface: tailscale0
    direction: in

- name: Enable UFW
  community.general.ufw:
    state: enabled
