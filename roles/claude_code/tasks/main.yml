---
- name: Install NodeSource apt signing key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    mode: "0644"
  check_mode: false

- name: Add NodeSource apt repo (Node 20 LTS)
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_20.x nodistro main"
    filename: nodesource
    state: present
    update_cache: true

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present

- name: Install Claude Code globally
  community.general.npm:
    name: "@anthropic-ai/claude-code"
    global: true
    state: latest
  when: not ansible_check_mode
