---
# WSL2 requires systemd to be enabled in /etc/wsl.conf for k3s and Tailscale
# to run as services. This must be present before those roles install their units.
# After this task runs, WSL2 must be restarted (wsl --shutdown) for systemd to
# take effect if it was not already enabled.
- name: Ensure [boot] section exists in /etc/wsl.conf
  ansible.builtin.lineinfile:
    path: /etc/wsl.conf
    line: "[boot]"
    state: present
    create: true
    mode: "0644"

- name: Ensure systemd=true in [boot] section of /etc/wsl.conf
  ansible.builtin.lineinfile:
    path: /etc/wsl.conf
    insertafter: "\\[boot\\]"
    regexp: "^systemd="
    line: "systemd=true"
    state: present

# WSL2's root mount is private by default. Containers using HostToContainer or
# Bidirectional mount propagation (node-exporter, NFD worker) fail with
# "path / is not a shared or slave mount". A one-shot systemd unit runs
# `mount --make-rshared /` at boot to fix this. Required by k3s on WSL2:
# https://docs.k3s.io/installation/requirements#wsl2
- name: Install mount-rshared systemd unit for WSL2
  ansible.builtin.copy:
    dest: /etc/systemd/system/k3s-wsl2-rshared.service
    mode: "0644"
    content: |
      [Unit]
      Description=Make root mount shared (required for k3s/containerd on WSL2)
      Before=k3s-agent.service

      [Service]
      Type=oneshot
      ExecStart=/bin/mount --make-rshared /
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target

- name: Enable and start k3s-wsl2-rshared service
  ansible.builtin.systemd:
    name: k3s-wsl2-rshared.service
    enabled: true
    state: started
    daemon_reload: true
