---
- name: Install Tailscale apt signing key
  ansible.builtin.get_url:
    url: "https://pkgs.tailscale.com/stable/ubuntu/{{ tailscale_apt_release }}.noarmor.gpg"
    dest: /etc/apt/keyrings/tailscale.gpg
    mode: "0644"
  check_mode: false

- name: Check for pre-existing Tailscale sources file
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/tailscale.list
  register: tailscale_sources_file

- name: Remove legacy Tailscale apt entry (old keyring path from manual installs)
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/tailscale.list
    regexp: 'signed-by=/usr/share/keyrings/tailscale-archive-keyring\.gpg'
    state: absent
  when: tailscale_sources_file.stat.exists

- name: Add Tailscale apt repo
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/tailscale.gpg] https://pkgs.tailscale.com/stable/ubuntu {{ tailscale_apt_release }} main"
    filename: tailscale
    state: present
    update_cache: true

- name: Install tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present

- name: Enable and start tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Check tailscale connection state
  ansible.builtin.command: tailscale status --json
  register: ts_status_raw
  changed_when: false
  failed_when: false

- name: Join tailnet
  ansible.builtin.command:
    cmd: "tailscale up --authkey={{ tailscale_authkey }} --accept-routes"
  register: ts_up
  changed_when: true
  no_log: true
  when: (ts_status_raw.stdout | default('{}') | from_json).get('BackendState', '') != 'Running'

- name: Check current advertised routes
  ansible.builtin.command: tailscale status --json
  register: ts_status_for_routes
  changed_when: false
  failed_when: false
  when: tailscale_advertise_routes | length > 0

- name: Advertise routes via Tailscale
  ansible.builtin.command:
    cmd: "tailscale set --advertise-routes={{ tailscale_advertise_routes | join(',') }}"
  changed_when: true
  when:
    - tailscale_advertise_routes | length > 0
    - (ts_status_for_routes.stdout | default('{}') | from_json).get('Self', {}).get('AdvertisedRoutes') | default([], true) | sort
      != tailscale_advertise_routes | sort

